# See https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/

name: Fly Deploy
on:
  push:
    branches:
      - main
permissions:
  contents: read
jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: deploy-group    # optional: ensure only one action runs at a time
    steps:
      - uses: actions/checkout@v6
        with:
          path: platform
      - uses: actions/checkout@v6
        with:
          repository: regents-ai/elixir-utils
          path: elixir-utils
          token: ${{ secrets.REGENTS_CI_GITHUB_TOKEN || github.token }}
      - uses: superfly/flyctl-actions/setup-flyctl@master
        with:
          version: 0.3.221
      - run: flyctl deploy --config platform/fly.toml --remote-only .
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
