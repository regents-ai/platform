components:
  parameters:
    SessionId:
      name: id
      in: path
      required: true
      schema:
        type: string
  responses:
    StatusMessage400:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StatusMessage'
    StatusMessage402:
      description: Payment required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StatusMessage'
    StatusMessage403:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StatusMessage'
    StatusMessage401:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StatusMessage'
    StatusMessage404:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StatusMessage'
    StatusMessage409:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StatusMessage'
    StatusMessage502:
      description: Upstream dependency failure
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StatusMessage'
    StatusMessage503:
      description: Missing server configuration or unavailable dependency
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StatusMessage'
  securitySchemes:
    PrivyBearerToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
    PrivySessionCookie:
      type: apiKey
      in: cookie
      name: _platform_phx_key
    AgentSessionCookie:
      type: apiKey
      in: cookie
      name: _platform_phx_key
    AgentSiwaHeaders:
      type: apiKey
      in: header
      name: x-siwa-receipt
      description: Placeholder for the signed SIWA header bundle used by authenticated agent requests. The required receipt audience depends on the operation description.
  schemas:
    StatusMessage:
      type: object
      required: [statusMessage]
      properties:
        statusMessage:
          type: string
    OkEnvelope:
      type: object
      required: [ok]
      properties:
        ok: {type: boolean}
    ReportingAgent:
      type: object
      required: [wallet_address, chain_id, registry_address, token_id]
      properties:
        wallet_address: {type: string}
        chain_id: {type: integer}
        registry_address: {type: string}
        token_id: {type: string}
        label: {type: [string, 'null']}
    ReportStatus:
      type: string
      enum: [pending, fixed, won't fix, duplicate]
    BugReportRequest:
      type: object
      required: [summary, details]
      properties:
        summary: {type: string}
        details: {type: string}
        reporting_agent:
          oneOf:
            - $ref: '#/components/schemas/ReportingAgent'
            - {type: 'null'}
    SecurityReportRequest:
      type: object
      required: [summary, details, contact]
      properties:
        summary: {type: string}
        details: {type: string}
        contact: {type: string}
        reporting_agent:
          oneOf:
            - $ref: '#/components/schemas/ReportingAgent'
            - {type: 'null'}
    BugReportRecord:
      type: object
      required: [report_id, summary, details, status, reporting_agent, created_at]
      properties:
        report_id: {type: string}
        summary: {type: string}
        details: {type: string}
        status:
          $ref: '#/components/schemas/ReportStatus'
        reporting_agent:
          oneOf:
            - $ref: '#/components/schemas/ReportingAgent'
            - {type: 'null'}
        created_at: {type: string, format: date-time}
    SecurityReportRecord:
      type: object
      required: [report_id, summary, details, contact, reporting_agent, created_at]
      properties:
        report_id: {type: string}
        summary: {type: string}
        details: {type: string}
        contact: {type: string}
        reporting_agent:
          oneOf:
            - $ref: '#/components/schemas/ReportingAgent'
            - {type: 'null'}
        created_at: {type: string, format: date-time}
    BugReportResponse:
      type: object
      required: [ok, message, public_url, report]
      properties:
        ok: {type: boolean}
        message: {type: string}
        public_url: {type: string}
        report:
          $ref: '#/components/schemas/BugReportRecord'
    SecurityReportResponse:
      type: object
      required: [ok, message, report]
      properties:
        ok: {type: boolean}
        message: {type: string}
        report:
          $ref: '#/components/schemas/SecurityReportRecord'
    BasenamesConfig:
      type: object
      required:
        - chainId
        - parentName
        - parentNode
        - registryAddress
        - l2ResolverAddress
        - ensChainId
        - ensParentName
        - ensParentNode
        - ensRegistryAddress
        - ensResolverAddress
        - priceWei
        - dbEnabled
        - mintingEnabled
        - ensMintingEnabled
      properties:
        chainId: {type: integer}
        parentName: {type: string}
        parentNode: {type: string}
        registryAddress: {type: string}
        l2ResolverAddress: {type: string}
        ensChainId: {type: integer}
        ensParentName: {type: string}
        ensParentNode: {type: string}
        ensRegistryAddress: {type: string}
        ensResolverAddress: {type: string}
        priceWei: {type: string}
        paymentRecipient: {type: [string, 'null']}
        dbEnabled: {type: boolean}
        mintingEnabled: {type: boolean}
        ensMintingEnabled: {type: boolean}
    BasenamesAllowance:
      type: object
      required: [parentName, parentNode, address, snapshotTotal, freeMintsUsed, freeMintsRemaining]
      properties:
        parentName: {type: string}
        parentNode: {type: string}
        address: {type: string}
        snapshotTotal: {type: integer}
        freeMintsUsed: {type: integer}
        freeMintsRemaining: {type: integer}
    BasenamesAllowances:
      type: object
      required: [parentName, parentNode, totalAddresses, allowances]
      properties:
        parentName: {type: string}
        parentNode: {type: string}
        totalAddresses: {type: integer}
        allowances:
          type: array
          items:
            $ref: '#/components/schemas/BasenamesAllowance'
    BasenamesAvailability:
      type: object
      required:
        - parentName
        - label
        - fqdn
        - node
        - owner
        - available
        - basenamesAvailable
        - ensParentName
        - ensFqdn
        - ensNode
        - ensOwner
        - ensAvailable
        - reserved
      properties:
        parentName: {type: string}
        label: {type: string}
        fqdn: {type: string}
        node: {type: string}
        owner: {type: string}
        available: {type: boolean}
        basenamesAvailable: {type: boolean}
        ensParentName: {type: string}
        ensFqdn: {type: string}
        ensNode: {type: string}
        ensOwner: {type: string}
        ensAvailable: {type: boolean}
        reserved: {type: boolean}
    BasenamesOwned:
      type: object
      required: [address, names]
      properties:
        address: {type: string}
        names:
          type: array
          items:
            type: object
            required: [label, fqdn, isFree, isInUse, createdAt]
            properties:
              label: {type: string}
              fqdn: {type: string}
              ensFqdn: {type: [string, 'null']}
              ensTxHash: {type: [string, 'null']}
              isFree: {type: boolean}
              isInUse: {type: boolean}
              createdAt: {type: string, format: date-time}
    BasenamesRecent:
      type: object
      required: [names]
      properties:
        names:
          type: array
          items:
            type: object
            required: [label, fqdn, createdAt]
            properties:
              label: {type: string}
              fqdn: {type: string}
              createdAt: {type: string, format: date-time}
    BasenamesCredits:
      type: object
      required: [parentName, parentNode, address, availableCredits, credits]
      properties:
        parentName: {type: string}
        parentNode: {type: string}
        address: {type: string}
        availableCredits: {type: integer}
        credits:
          type: array
          items:
            type: object
            required: [id, paymentTxHash, priceWei, createdAt]
            properties:
              id: {type: integer}
              paymentTxHash: {type: string}
              priceWei: {type: string}
              createdAt: {type: string, format: date-time}
    BasenamesCreditRegistration:
      type: object
      required: [ok, creditId, paymentTxHash, available]
      properties:
        ok: {type: boolean}
        creditId: {type: integer}
        paymentTxHash: {type: string}
        available: {type: boolean}
    BasenamesMintResponse:
      type: object
      required: [ok, fqdn, ensFqdn, label, txHash, ensTxHash, isFree, priceWei]
      properties:
        ok: {type: boolean}
        fqdn: {type: string}
        ensFqdn: {type: string}
        label: {type: string}
        txHash: {type: string}
        ensTxHash: {type: [string, 'null']}
        isFree: {type: boolean}
        priceWei: {type: string}
    BasenamesUseResponse:
      type: object
      required: [ok, label, fqdn, isInUse, existed]
      properties:
        ok: {type: boolean}
        label: {type: string}
        fqdn: {type: string}
        isInUse: {type: boolean}
        existed: {type: boolean}
    AgentLaunchAuction:
      type: object
      required:
        - id
        - agentId
        - agentName
        - ownerAddress
        - auctionAddress
        - network
        - status
        - startedAt
        - bidders
        - raisedCurrency
        - targetCurrency
        - progressPercent
      properties:
        id: {type: string}
        agentId: {type: string}
        agentName: {type: string}
        ownerAddress: {type: string}
        auctionAddress: {type: string}
        tokenAddress: {type: [string, 'null']}
        network: {type: string}
        status: {type: string}
        startedAt: {type: [string, 'null'], format: date-time}
        endsAt: {type: [string, 'null'], format: date-time}
        claimAt: {type: [string, 'null'], format: date-time}
        bidders: {type: integer}
        raisedCurrency: {type: string}
        targetCurrency: {type: string}
        progressPercent: {type: integer}
        notes: {type: [string, 'null']}
        uniswapUrl: {type: [string, 'null']}
    PrivySessionRequest:
      type: object
