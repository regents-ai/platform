openapi: 3.1.0
info:
  title: PlatformPhx API
  version: 0.1.0
  description: HTTP contract for the web product APIs.
servers:
  - url: /
paths:
  /metrics:
    get:
      operationId: prometheusMetrics
      responses:
        '200':
          description: Prometheus scrape payload for app and runtime metrics
          content:
            text/plain:
              schema:
                type: string
  /api/basenames/config:
    get:
      operationId: basenamesConfig
      responses:
        '200':
          description: Basenames client configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasenamesConfig'
        '502':
          $ref: '#/components/responses/StatusMessage502'
  /api/basenames/allowances:
    get:
      operationId: basenamesAllowances
      responses:
        '200':
          description: Snapshot allowance table
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasenamesAllowances'
        '503':
          $ref: '#/components/responses/StatusMessage503'
  /api/basenames/allowance:
    get:
      operationId: basenamesAllowance
      parameters:
        - name: address
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Free-mint allowance for one wallet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasenamesAllowance'
        '400':
          $ref: '#/components/responses/StatusMessage400'
        '503':
          $ref: '#/components/responses/StatusMessage503'
  /api/basenames/availability:
    get:
      operationId: basenamesAvailability
      parameters:
        - name: label
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Name availability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasenamesAvailability'
        '400':
          $ref: '#/components/responses/StatusMessage400'
        '503':
          $ref: '#/components/responses/StatusMessage503'
  /api/basenames/credits:
    get:
      operationId: basenamesCredits
      parameters:
        - name: address
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Available payment credits for one wallet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasenamesCredits'
        '400':
          $ref: '#/components/responses/StatusMessage400'
        '503':
          $ref: '#/components/responses/StatusMessage503'
  /api/basenames/owned:
    get:
      operationId: basenamesOwned
      parameters:
        - name: address
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Names owned by a wallet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasenamesOwned'
        '400':
          $ref: '#/components/responses/StatusMessage400'
        '503':
          $ref: '#/components/responses/StatusMessage503'
  /api/basenames/recent:
    get:
      operationId: basenamesRecent
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        '200':
          description: Recent minted names
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasenamesRecent'
        '400':
          $ref: '#/components/responses/StatusMessage400'
        '503':
          $ref: '#/components/responses/StatusMessage503'
  /api/basenames/credit:
    post:
      operationId: basenamesRegisterCredit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [address, paymentTxHash]
              properties:
                address:
                  type: string
                paymentTxHash:
                  type: string
                paymentChainId:
                  type: integer
      responses:
        '200':
          description: Payment credit registered or reused
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasenamesCreditRegistration'
        '400':
          $ref: '#/components/responses/StatusMessage400'
        '409':
          $ref: '#/components/responses/StatusMessage409'
        '503':
          $ref: '#/components/responses/StatusMessage503'
        '502':
          $ref: '#/components/responses/StatusMessage502'
  /api/basenames/mint:
    post:
      operationId: basenamesMint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [address, label, signature, timestamp]
              properties:
                address:
                  type: string
                label:
                  type: string
                signature:
                  type: string
                timestamp:
                  oneOf:
                    - type: integer
                    - type: string
                useCredit:
                  oneOf:
                    - type: boolean
                    - type: string
                paymentTxHash:
                  type: string
                paymentChainId:
                  type: integer
      responses:
        '200':
          description: Name minted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasenamesMintResponse'
        '400':
          $ref: '#/components/responses/StatusMessage400'
        '402':
          $ref: '#/components/responses/StatusMessage402'
        '409':
          $ref: '#/components/responses/StatusMessage409'
        '503':
          $ref: '#/components/responses/StatusMessage503'
        '502':
          $ref: '#/components/responses/StatusMessage502'
  /api/basenames/use:
    post:
      operationId: basenamesMarkInUse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [address, label]
              properties:
                address:
                  type: string
                label:
                  type: string
                isRandom:
                  oneOf:
                    - type: boolean
                    - type: string
      responses:
        '200':
          description: Name marked in use
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasenamesUseResponse'
        '400':
          $ref: '#/components/responses/StatusMessage400'
        '403':
          $ref: '#/components/responses/StatusMessage403'
        '404':
          $ref: '#/components/responses/StatusMessage404'
        '409':
          $ref: '#/components/responses/StatusMessage409'
        '503':
          $ref: '#/components/responses/StatusMessage503'
        '502':
          $ref: '#/components/responses/StatusMessage502'
  /api/agentlaunch/auctions:
    get:
      operationId: agentLaunchAuctions
      responses:
        '200':
          description: Current auction payload
          content:
            application/json:
              schema:
                type: object
                required: [auctions, generatedAt]
                properties:
                  auctions:
                    type: array
                    items:
                      $ref: '#/components/schemas/AgentLaunchAuction'
                  generatedAt:
                    type: string
                    format: date-time
  /api/bug-report:
    post:
      operationId: createBugReport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BugReportRequest'
      responses:
        '200':
          description: Bug report stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BugReportResponse'
        '400':
          $ref: '#/components/responses/StatusMessage400'
  /api/security-report:
    post:
      operationId: createSecurityReport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SecurityReportRequest'
      responses:
        '200':
          description: Security report stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecurityReportResponse'
        '400':
          $ref: '#/components/responses/StatusMessage400'
  /v1/agent/bug-report:
    post:
      operationId: createAgentBugReport
      security: [{ AgentSiwaHeaders: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BugReportRequest'
      responses:
        '200':
          description: Bug report stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BugReportResponse'
        '400':
          $ref: '#/components/responses/StatusMessage400'
        '401':
          $ref: '#/components/responses/StatusMessage401'
  /v1/agent/security-report:
    post:
      operationId: createAgentSecurityReport
      security: [{ AgentSiwaHeaders: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SecurityReportRequest'
      responses:
        '200':
          description: Security report stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecurityReportResponse'
        '400':
          $ref: '#/components/responses/StatusMessage400'
        '401':
          $ref: '#/components/responses/StatusMessage401'
  /v1/agent/siwa/nonce:
    post:
      operationId: issueAgentSiwaNonce
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SiwaNonceRequest'
      responses:
        '200':
          description: Signed login nonce created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SiwaNonceResponse'
        '400':
          $ref: '#/components/responses/StatusMessage400'
  /v1/agent/siwa/verify:
    post:
      operationId: verifyAgentSiwaSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SiwaVerifyRequest'
      responses:
        '200':
          description: Signed login verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SiwaVerifyResponse'
        '400':
          $ref: '#/components/responses/StatusMessage400'
        '401':
          $ref: '#/components/responses/StatusMessage401'
  /v1/agent/siwa/http-verify:
    post:
      operationId: verifyAgentSiwaHttpEnvelope
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SiwaHttpVerifyRequest'
      responses:
        '200':
          description: Signed request verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SiwaHttpVerifyResponse'
        '400':
          $ref: '#/components/responses/StatusMessage400'
        '401':
          $ref: '#/components/responses/StatusMessage401'
  /api/agent-platform/templates:
    get:
      operationId: agentPlatformTemplates
      responses:
        '200':
          description: Built-in agent template catalog
          content:
            application/json:
              schema:
                type: object
                required: [ok, templates]
                properties:
                  ok: {type: boolean}
                  templates:
                    type: array
                    items:
                      $ref: '#/components/schemas/AgentTemplate'
  /api/agent-platform/resolve:
    get:
      operationId: agentPlatformResolveHost
      parameters:
        - name: host
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Published agent matching a host
          content:
            application/json:
              schema:
                type: object
                required: [ok, host, agent]
                properties:
                  ok: {type: boolean}
                  host: {type: string}
                  agent:
                    $ref: '#/components/schemas/PublicAgentRecord'
        '400':
          $ref: '#/components/responses/StatusMessage400'
        '404':
          $ref: '#/components/responses/StatusMessage404'
  /api/agent-platform/agents/{slug}/feed:
    get:
      operationId: agentPlatformFeed
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Public feed for one published agent
          content:
            application/json:
              schema:
                type: object
                required: [ok, agent, feed]
                properties:
                  ok: {type: boolean}
                  agent:
                    type: object
                    required: [slug, name]
                    properties:
                      slug: {type: string}
                      name: {type: string}
                  feed:
                    type: array
                    items:
                      $ref: '#/components/schemas/AgentArtifact'
        '400':
          $ref: '#/components/responses/StatusMessage400'
        '404':
          $ref: '#/components/responses/StatusMessage404'
  /api/auth/privy/session:
    post:
      operationId: privySessionCreate
      security: [{ PrivyBearerToken: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrivySessionRequest'
      responses:
        '200':
          description: Session established for a Privy human
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentHumanProfile'
        '400':
          $ref: '#/components/responses/StatusMessage400'
        '403':
          $ref: '#/components/responses/StatusMessage403'
        '401':
          $ref: '#/components/responses/StatusMessage401'
    delete:
      operationId: privySessionDelete
      security: [{ PrivySessionCookie: [] }]
      responses:
        '200':
          description: Session cleared
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: {type: boolean}
        '403':
          $ref: '#/components/responses/StatusMessage403'
  /api/auth/privy/csrf:
    get:
      operationId: privySessionCsrf
      responses:
        '200':
          description: Request-protection token for session-backed JSON writes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivySessionCsrf'
  /api/auth/privy/profile:
    get:
      operationId: privySessionProfile
      security: [{ PrivySessionCookie: [] }]
      responses:
        '200':
          description: Current signed-in human and foundry state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentHumanProfile'
  /api/agent-platform/formation:
    get:
      operationId: agentPlatformFormation
      security: [{ PrivySessionCookie: [] }]
      responses:
        '200':
          description: Agent Formation state for the current signed-in human
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentFormationResponse'
        '502':
          $ref: '#/components/responses/StatusMessage502'
        '503':
          $ref: '#/components/responses/StatusMessage503'
  /api/agent-platform/billing/setup/checkout:
    post:
      operationId: agentPlatformBillingSetupCheckout
      security: [{ PrivySessionCookie: [] }]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BillingSetupCheckoutRequest'
      responses:
        '200':
          description: Stripe-hosted billing setup started for the current human
          content:
            application/json:
              schema:
                type: object
                required: [ok, checkout_url, billing_account]
                properties:
                  ok: {type: boolean}
                  checkout_url: {type: string}
                  billing_account:
                    $ref: '#/components/schemas/BillingAccount'
        '401':
          $ref: '#/components/responses/StatusMessage401'
        '403':
          $ref: '#/components/responses/StatusMessage403'
        '503':
          $ref: '#/components/responses/StatusMessage503'
  /api/agent-platform/billing/account:
    get:
      operationId: agentPlatformBillingAccount
      security: [{ PrivySessionCookie: [] }]
      responses:
        '200':
          description: Current billing account for the signed-in human
          content:
            application/json:
              schema:
                type: object
                required: [ok, billing_account]
                properties:
                  ok: {type: boolean}
                  billing_account:
                    $ref: '#/components/schemas/BillingAccount'
        '401':
          $ref: '#/components/responses/StatusMessage401'
  /api/agent-platform/billing/usage:
    get:
      operationId: agentPlatformBillingUsage
      security: [{ PrivySessionCookie: [] }]
      responses:
        '200':
          description: Shared runtime usage summary for the signed-in human
          content:
            application/json:
              schema:
                type: object
                required: [ok, usage]
                properties:
                  ok: {type: boolean}
                  usage:
                    $ref: '#/components/schemas/BillingUsageSummary'
        '401':
          $ref: '#/components/responses/StatusMessage401'
  /api/agent-platform/formation/companies:
    post:
      operationId: agentPlatformFormationCreateCompany
      security: [{ PrivySessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFormationCompanyRequest'
      responses:
        '202':
          description: Agent Formation started for the selected claimed name
          content:
            application/json:
              schema:
                type: object
                required: [ok, agent, formation]
                properties:
                  ok: {type: boolean}
                  agent:
                    $ref: '#/components/schemas/AgentRecord'
                  formation:
                    $ref: '#/components/schemas/AgentFormation'
        '400':
          $ref: '#/components/responses/StatusMessage400'
        '401':
          $ref: '#/components/responses/StatusMessage401'
        '402':
          $ref: '#/components/responses/StatusMessage402'
        '403':
          $ref: '#/components/responses/StatusMessage403'
        '409':
          $ref: '#/components/responses/StatusMessage409'
  /api/agent-platform/agents/{slug}/runtime:
    get:
      operationId: agentPlatformFormationRuntime
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Runtime status for one owned agent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRuntimeResponse'
        '401':
          $ref: '#/components/responses/StatusMessage401'
        '404':
          $ref: '#/components/responses/StatusMessage404'
  /api/agent-platform/billing/topups/checkout:
    post:
      operationId: agentPlatformBillingTopupCheckout
      security: [{ PrivySessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BillingTopupCheckoutRequest'
      responses:
        '200':
          description: Stripe-hosted checkout started for shared runtime credit
          content:
            application/json:
              schema:
                type: object
                required: [ok, checkout_url, billing_account]
                properties:
                  ok: {type: boolean}
                  checkout_url: {type: string}
                  billing_account:
                    $ref: '#/components/schemas/BillingAccount'
        '400':
          $ref: '#/components/responses/StatusMessage400'
        '401':
          $ref: '#/components/responses/StatusMessage401'
        '403':
          $ref: '#/components/responses/StatusMessage403'
  /api/agent-platform/stripe/webhooks:
    post:
      operationId: agentPlatformStripeWebhook
      responses:
        '200':
          description: Stripe billing webhook accepted
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: {type: boolean}
        '401':
          $ref: '#/components/responses/StatusMessage401'
        '503':
          $ref: '#/components/responses/StatusMessage503'
  /api/agent-platform/sprites/{slug}/pause:
    post:
      operationId: agentPlatformPauseSprite
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Sprite runtime marked paused
          content:
            application/json:
              schema:
                type: object
                required: [ok, sprite]
                properties:
                  ok: {type: boolean}
                  sprite:
                    $ref: '#/components/schemas/SpriteRuntimeControl'
        '401':
          $ref: '#/components/responses/StatusMessage401'
        '403':
          $ref: '#/components/responses/StatusMessage403'
        '404':
          $ref: '#/components/responses/StatusMessage404'
  /api/agent-platform/sprites/{slug}/resume:
    post:
      operationId: agentPlatformResumeSprite
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Sprite runtime marked active
          content:
            application/json:
              schema:
                type: object
                required: [ok, sprite]
                properties:
                  ok: {type: boolean}
                  sprite:
                    $ref: '#/components/schemas/SpriteRuntimeControl'
                  billing_account:
                    $ref: '#/components/schemas/BillingAccount'
        '401':
          $ref: '#/components/responses/StatusMessage401'
        '402':
          $ref: '#/components/responses/StatusMessage402'
        '403':
          $ref: '#/components/responses/StatusMessage403'
        '404':
          $ref: '#/components/responses/StatusMessage404'
  /api/opensea:
    get:
      operationId: openSeaHoldings
      parameters:
        - name: address
          in: query
          required: true
          schema:
            type: string
        - name: collection
          in: query
          required: false
          schema:
            type: string
            enum: [animata, regent-animata-ii, regents-club]
      responses:
        '200':
          description: OpenSea holdings for supported collections
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenSeaHoldings'
        '400':
          $ref: '#/components/responses/StatusMessage400'
        '502':
          $ref: '#/components/responses/StatusMessage502'
        '503':
          $ref: '#/components/responses/StatusMessage503'
components:
  responses:
    StatusMessage400:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StatusMessage'
    StatusMessage402:
      description: Payment required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StatusMessage'
    StatusMessage403:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StatusMessage'
    StatusMessage401:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StatusMessage'
    StatusMessage404:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StatusMessage'
    StatusMessage409:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StatusMessage'
    StatusMessage502:
      description: Upstream dependency failure
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StatusMessage'
    StatusMessage503:
      description: Missing server configuration or unavailable dependency
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StatusMessage'
  securitySchemes:
    PrivyBearerToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
    PrivySessionCookie:
      type: apiKey
      in: cookie
      name: _platform_phx_key
    AgentSiwaHeaders:
      type: apiKey
      in: header
      name: x-siwa-receipt
      description: Placeholder for the signed SIWA header bundle used by authenticated agent requests.
  schemas:
    StatusMessage:
      type: object
      required: [statusMessage]
      properties:
        statusMessage:
          type: string
    ReportingAgent:
      type: object
      required: [wallet_address, chain_id, registry_address, token_id]
      properties:
        wallet_address: {type: string}
        chain_id: {type: integer}
        registry_address: {type: string}
        token_id: {type: string}
        label: {type: [string, 'null']}
    ReportStatus:
      type: string
      enum: [pending, fixed, won't fix, duplicate]
    BugReportRequest:
      type: object
      required: [summary, details, reporting_agent]
      properties:
        summary: {type: string}
        details: {type: string}
        reporting_agent:
          $ref: '#/components/schemas/ReportingAgent'
    SecurityReportRequest:
      type: object
      required: [summary, details, contact, reporting_agent]
      properties:
        summary: {type: string}
        details: {type: string}
        contact: {type: string}
        reporting_agent:
          $ref: '#/components/schemas/ReportingAgent'
    BugReportRecord:
      type: object
      required: [report_id, summary, details, status, reporting_agent, created_at]
      properties:
        report_id: {type: string}
        summary: {type: string}
        details: {type: string}
        status:
          $ref: '#/components/schemas/ReportStatus'
        reporting_agent:
          $ref: '#/components/schemas/ReportingAgent'
        created_at: {type: string, format: date-time}
    SecurityReportRecord:
      type: object
      required: [report_id, summary, details, contact, reporting_agent, created_at]
      properties:
        report_id: {type: string}
        summary: {type: string}
        details: {type: string}
        contact: {type: string}
        reporting_agent:
          $ref: '#/components/schemas/ReportingAgent'
