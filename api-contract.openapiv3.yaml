            metering_status: {type: string}
            desired_runtime_state: {type: string}
            observed_runtime_state: {type: string}
        workspace:
          type: object
          required: [url, status, http_port]
          properties:
            url: {type: [string, 'null']}
            status: {type: string}
            http_port: {type: integer}
        hermes:
          type: object
          required: [status, adapter_type, model, persist_session, toolsets, runtime_plugins, shared_skills]
          properties:
            status: {type: string}
            adapter_type: {type: string}
            model: {type: string}
            persist_session: {type: boolean}
            toolsets:
