openapi: 3.1.0
info:
  title: PlatformPhx API
  version: 0.1.0
  description: HTTP contract for the Platform web product APIs. Shared SIWA auth behavior is owned by the shared Regent services contract.
servers:
  - url: /
paths:
  /metrics:
    get:
      operationId: prometheusMetrics
      responses:
        '200':
          description: Prometheus scrape payload for app and runtime metrics
          content:
            text/plain:
              schema:
                type: string
  /healthz:
    get:
      operationId: healthz
      responses:
        '200':
          description: Simple health check response for public discovery
          content:
            text/plain:
              schema:
                type: string
  /robots.txt:
    get:
      operationId: robotsTxt
      responses:
        '200':
          description: Crawl rules and AI usage preferences for public pages
          content:
            text/plain:
              schema:
                type: string
  /sitemap.xml:
    get:
      operationId: sitemapXml
      responses:
        '200':
          description: Sitemap for the public entry pages and live company home pages
          content:
            application/xml:
              schema:
                type: string
  /.well-known/api-catalog:
    get:
      operationId: apiCatalog
      responses:
        '200':
          description: API discovery catalog for the Regent public APIs
          content:
            application/linkset+json:
              schema:
                type: object
  /.well-known/agent-card.json:
    get:
      operationId: agentCard
      responses:
        '200':
          description: A2A-style discovery card for the Regents site agent surface
          content:
            application/json:
              schema:
                type: object
  /.well-known/agent-skills/index.json:
    get:
      operationId: agentSkillsIndex
      responses:
        '200':
          description: Skills discovery index for site-hosted Regent agent skills
          content:
            application/json:
              schema:
                type: object
  /.well-known/mcp/server-card.json:
    get:
      operationId: mcpServerCard
      responses:
        '200':
          description: Discovery card for the Regents MCP-related public resources
          content:
            application/json:
              schema:
                type: object
  /api-contract.openapiv3.yaml:
    get:
      operationId: apiContractSource
      responses:
        '200':
          description: Source-of-truth OpenAPI contract for this product
          content:
            application/yaml:
              schema:
                type: string
  /cli-contract.yaml:
    get:
      operationId: cliContractSource
      responses:
        '200':
          description: Source-of-truth CLI contract for Regents CLI
          content:
            application/yaml:
              schema:
                type: string
  /agent-skills/regents-cli.md:
    get:
      operationId: regentsCliSkillDocument
      responses:
        '200':
          description: Published Regents CLI skill document for operators and agents
          content:
            text/markdown:
              schema:
                type: string
  /api/basenames/config:
    get:
      operationId: basenamesConfig
      responses:
        '200':
          description: Basenames client configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasenamesConfig'
        '502':
          $ref: '#/components/responses/StatusMessage502'
  /api/basenames/allowances:
    get:
      operationId: basenamesAllowances
      responses:
        '200':
          description: Snapshot allowance table
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasenamesAllowances'
        '503':
          $ref: '#/components/responses/StatusMessage503'
  /api/basenames/allowance:
    get:
      operationId: basenamesAllowance
      parameters:
        - name: address
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Free-mint allowance for one wallet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasenamesAllowance'
        '400':
          $ref: '#/components/responses/StatusMessage400'
        '503':
          $ref: '#/components/responses/StatusMessage503'
  /api/basenames/availability:
    get:
      operationId: basenamesAvailability
      parameters:
        - name: label
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Name availability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasenamesAvailability'
        '400':
          $ref: '#/components/responses/StatusMessage400'
        '503':
          $ref: '#/components/responses/StatusMessage503'
  /api/basenames/credits:
    get:
      operationId: basenamesCredits
      parameters:
        - name: address
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Available payment credits for one wallet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasenamesCredits'
        '400':
          $ref: '#/components/responses/StatusMessage400'
        '503':
          $ref: '#/components/responses/StatusMessage503'
  /api/basenames/owned:
    get:
      operationId: basenamesOwned
      parameters:
        - name: address
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Names owned by a wallet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasenamesOwned'
        '400':
          $ref: '#/components/responses/StatusMessage400'
        '503':
          $ref: '#/components/responses/StatusMessage503'
  /api/basenames/recent:
    get:
      operationId: basenamesRecent
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        '200':
          description: Recent minted names
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasenamesRecent'
        '400':
          $ref: '#/components/responses/StatusMessage400'
        '503':
          $ref: '#/components/responses/StatusMessage503'
  /api/basenames/credit:
    post:
      operationId: basenamesRegisterCredit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [address, paymentTxHash]
              properties:
                address:
                  type: string
                paymentTxHash:
                  type: string
                paymentChainId:
                  type: integer
      responses:
        '200':
          description: Payment credit registered or reused
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasenamesCreditRegistration'
        '400':
          $ref: '#/components/responses/StatusMessage400'
        '409':
          $ref: '#/components/responses/StatusMessage409'
        '503':
          $ref: '#/components/responses/StatusMessage503'
        '502':
          $ref: '#/components/responses/StatusMessage502'
  /api/basenames/mint:
    post:
      operationId: basenamesMint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [address, label, signature, timestamp]
              properties:
                address:
                  type: string
                label:
                  type: string
                signature:
                  type: string
                timestamp:
                  oneOf:
                    - type: integer
                    - type: string
                useCredit:
                  oneOf:
                    - type: boolean
                    - type: string
                paymentTxHash:
                  type: string
                paymentChainId:
                  type: integer
      responses:
        '200':
          description: Name minted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasenamesMintResponse'
        '400':
          $ref: '#/components/responses/StatusMessage400'
        '402':
          $ref: '#/components/responses/StatusMessage402'
        '409':
          $ref: '#/components/responses/StatusMessage409'
        '503':
          $ref: '#/components/responses/StatusMessage503'
        '502':
          $ref: '#/components/responses/StatusMessage502'
  /api/basenames/use:
    post:
      operationId: basenamesMarkInUse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [address, label]
              properties:
                address:
                  type: string
                label:
                  type: string
                isRandom:
                  oneOf:
                    - type: boolean
                    - type: string
      responses:
        '200':
          description: Name marked in use
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasenamesUseResponse'
        '400':
          $ref: '#/components/responses/StatusMessage400'
        '403':
          $ref: '#/components/responses/StatusMessage403'
        '404':
          $ref: '#/components/responses/StatusMessage404'
        '409':
          $ref: '#/components/responses/StatusMessage409'
        '503':
          $ref: '#/components/responses/StatusMessage503'
        '502':
          $ref: '#/components/responses/StatusMessage502'
  /api/agentlaunch/auctions:
    get:
      operationId: agentLaunchAuctions
      responses:
        '200':
          description: Current auction payload
          content:
            application/json:
              schema:
                type: object
                required: [auctions, generatedAt]
                properties:
                  auctions:
                    type: array
                    items:
                      $ref: '#/components/schemas/AgentLaunchAuction'
                  generatedAt:
                    type: string
                    format: date-time
  /api/bug-report:
    post:
      operationId: createBugReport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BugReportRequest'
      responses:
        '200':
          description: Bug report stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BugReportResponse'
        '400':
          $ref: '#/components/responses/StatusMessage400'
  /api/security-report:
    post:
      operationId: createSecurityReport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SecurityReportRequest'
      responses:
        '200':
          description: Security report stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecurityReportResponse'
        '400':
          $ref: '#/components/responses/StatusMessage400'
  /v1/agent/bug-report:
    post:
      operationId: createAgentBugReport
      security: [{ AgentSiwaHeaders: [] }]
      description: Bug report stored from a signed agent request using a regents.sh SIWA receipt.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BugReportRequest'
      responses:
        '200':
          description: Bug report stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BugReportResponse'
        '400':
          $ref: '#/components/responses/StatusMessage400'
        '401':
          $ref: '#/components/responses/StatusMessage401'
  /v1/agent/security-report:
    post:
      operationId: createAgentSecurityReport
      security: [{ AgentSiwaHeaders: [] }]
      description: Security report stored from a signed agent request using a regents.sh SIWA receipt.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SecurityReportRequest'
      responses:
        '200':
          description: Security report stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecurityReportResponse'
        '400':
          $ref: '#/components/responses/StatusMessage400'
        '401':
          $ref: '#/components/responses/StatusMessage401'
  /api/auth/agent/session:
    get:
      operationId: getPlatformAgentSession
      security: [{ AgentSessionCookie: [] }]
      responses:
        '200':
          description: Current local platform agent session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentSessionResponse'
    post:
      operationId: createPlatformAgentSession
      security: [{ AgentSiwaHeaders: [] }]
      description: Local platform session created from a signed agent request using a platform SIWA receipt.
      responses:
        '200':
          description: Local platform session created from a shared SIWA receipt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentSessionResponse'
        '401':
          $ref: '#/components/responses/StatusMessage401'
    delete:
      operationId: deletePlatformAgentSession
      security: [{ AgentSessionCookie: [] }]
      responses:
        '200':
          description: Local platform agent session cleared
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkEnvelope'
  /api/agentbook/sessions:
    post:
      operationId: createAgentbookTrustSession
      security: [{ AgentSiwaHeaders: [] }]
      description: Create a hosted human-backed trust session for the current signed Regent agent.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentbookSessionCreateRequest'
      responses:
        '200':
          description: Hosted trust session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentbookSessionResponse'
        '401':
          $ref: '#/components/responses/StatusMessage401'
  /api/agentbook/sessions/{id}:
    get:
      operationId: getAgentbookTrustSession
      security: [{ AgentSiwaHeaders: [] }]
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Current hosted trust session status for the signed Regent agent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentbookSessionResponse'
        '401':
          $ref: '#/components/responses/StatusMessage401'
        '404':
          $ref: '#/components/responses/StatusMessage404'
  /api/agentbook/sessions/{id}/submit:
    post:
      operationId: submitAgentbookTrustSession
      security: [{ AgentSessionCookie: [] }]
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentbookSessionSubmitRequest'
      responses:
        '200':
          description: Hosted trust session updated after human approval
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentbookSessionResponse'
        '400':
          $ref: '#/components/responses/StatusMessage400'
        '401':
          $ref: '#/components/responses/StatusMessage401'
        '404':
          $ref: '#/components/responses/StatusMessage404'
  /api/agentbook/lookup:
    get:
      operationId: lookupAgentbookTrust
      security: [{ AgentSiwaHeaders: [] }]
      responses:
        '200':
          description: Current human-backed trust summary for the signed Regent agent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentbookLookupResponse'
        '401':
          $ref: '#/components/responses/StatusMessage401'
  /api/agent-platform/templates:
    get:
      operationId: agentPlatformTemplates
      responses:
        '200':
          description: Built-in agent template catalog
          content:
            application/json:
              schema:
                type: object
                required: [ok, templates]
                properties:
                  ok: {type: boolean}
                  templates:
                    type: array
                    items:
                      $ref: '#/components/schemas/AgentTemplate'
  /api/agent-platform/resolve:
    get:
      operationId: agentPlatformResolveHost
      parameters:
        - name: host
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Published agent matching a host
          content:
            application/json:
              schema:
                type: object
                required: [ok, host, agent]
                properties:
                  ok: {type: boolean}
                  host: {type: string}
                  agent:
                    $ref: '#/components/schemas/PublicAgentRecord'
        '400':
          $ref: '#/components/responses/StatusMessage400'
        '404':
          $ref: '#/components/responses/StatusMessage404'
  /api/agent-platform/agents/{slug}/feed:
    get:
      operationId: agentPlatformFeed
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Public feed for one published agent
          content:
            application/json:
              schema:
                type: object
                required: [ok, agent, feed]
                properties:
                  ok: {type: boolean}
                  agent:
                    type: object
                    required: [slug, name]
                    properties:
                      slug: {type: string}
                      name: {type: string}
                  feed:
                    type: array
                    items:
                      $ref: '#/components/schemas/AgentArtifact'
        '400':
          $ref: '#/components/responses/StatusMessage400'
        '404':
          $ref: '#/components/responses/StatusMessage404'
  /api/auth/privy/session:
    post:
      operationId: privySessionCreate
      security: [{ PrivyBearerToken: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrivySessionRequest'
      responses:
        '200':
          description: Session established for a Privy human
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentHumanProfile'
        '400':
          $ref: '#/components/responses/StatusMessage400'
        '403':
          $ref: '#/components/responses/StatusMessage403'
        '401':
          $ref: '#/components/responses/StatusMessage401'
    delete:
      operationId: privySessionDelete
      security: [{ PrivySessionCookie: [] }]
      responses:
        '200':
          description: Session cleared
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: {type: boolean}
        '403':
          $ref: '#/components/responses/StatusMessage403'
  /api/auth/privy/csrf:
    get:
      operationId: privySessionCsrf
      responses:
        '200':
          description: Request-protection token for session-backed JSON writes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivySessionCsrf'
  /api/auth/privy/profile:
    get:
      operationId: privySessionProfile
      security: [{ PrivySessionCookie: [] }]
      responses:
        '200':
          description: Current signed-in human and foundry state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentHumanProfile'
  /api/auth/privy/profile/avatar:
    put:
      operationId: privySessionProfileAvatarUpdate
      security: [{ PrivySessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AvatarSelectionInput'
      responses:
        '200':
          description: Saved avatar selection for the current signed-in human
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentHumanProfile'
        '400':
          $ref: '#/components/responses/StatusMessage400'
        '401':
          $ref: '#/components/responses/StatusMessage401'
  /api/regent/staking:
    get:
      operationId: regentStakingOverview
      responses:
        '200':
          description: Shared Regent staking overview for the public token page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegentStakingOverviewResponse'
        '503':
          $ref: '#/components/responses/StatusMessage503'
  /api/regent/staking/account/{address}:
    get:
      operationId: regentStakingAccount
      parameters:
        - name: address
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Shared Regent staking overview scoped to one wallet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegentStakingAccountResponse'
        '400':
          $ref: '#/components/responses/StatusMessage400'
        '503':
          $ref: '#/components/responses/StatusMessage503'
  /api/regent/staking/stake:
    post:
      operationId: regentStakingStake
      security: [{ PrivySessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegentStakingAmountRequest'
      responses:
        '200':
          description: Prepared wallet action for staking REGENT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegentStakingWalletActionResponse'
        '400':
          $ref: '#/components/responses/StatusMessage400'
        '401':
          $ref: '#/components/responses/StatusMessage401'
        '503':
          $ref: '#/components/responses/StatusMessage503'
  /api/regent/staking/unstake:
    post:
      operationId: regentStakingUnstake
      security: [{ PrivySessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegentStakingAmountRequest'
      responses:
        '200':
          description: Prepared wallet action for unstaking REGENT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegentStakingWalletActionResponse'
        '400':
          $ref: '#/components/responses/StatusMessage400'
        '401':
          $ref: '#/components/responses/StatusMessage401'
        '503':
          $ref: '#/components/responses/StatusMessage503'
  /api/regent/staking/claim-usdc:
    post:
      operationId: regentStakingClaimUsdc
      security: [{ PrivySessionCookie: [] }]
      responses:
        '200':
          description: Prepared wallet action for claiming USDC rewards
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegentStakingWalletActionResponse'
        '400':
          $ref: '#/components/responses/StatusMessage400'
        '401':
          $ref: '#/components/responses/StatusMessage401'
        '503':
          $ref: '#/components/responses/StatusMessage503'
  /api/regent/staking/claim-regent:
    post:
      operationId: regentStakingClaimRegent
      security: [{ PrivySessionCookie: [] }]
      responses:
        '200':
          description: Prepared wallet action for claiming REGENT rewards
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegentStakingWalletActionResponse'
        '400':
          $ref: '#/components/responses/StatusMessage400'
        '401':
          $ref: '#/components/responses/StatusMessage401'
        '503':
          $ref: '#/components/responses/StatusMessage503'
  /api/regent/staking/claim-and-restake-regent:
    post:
      operationId: regentStakingClaimAndRestakeRegent
      security: [{ PrivySessionCookie: [] }]
      responses:
        '200':
          description: Prepared wallet action for claiming and restaking REGENT rewards
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegentStakingWalletActionResponse'
        '400':
          $ref: '#/components/responses/StatusMessage400'
        '401':
          $ref: '#/components/responses/StatusMessage401'
        '503':
          $ref: '#/components/responses/StatusMessage503'
  /api/regent/staking/deposit-usdc/prepare:
    post:
      operationId: regentStakingPrepareDepositUsdc
      security: [{ PrivySessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegentStakingDepositRequest'
      responses:
        '200':
          description: Prepared multisig payload for treasury USDC deposit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegentStakingPrepareResponse'
        '400':
          $ref: '#/components/responses/StatusMessage400'
        '503':
          $ref: '#/components/responses/StatusMessage503'
  /api/regent/staking/withdraw-treasury/prepare:
    post:
      operationId: regentStakingPrepareWithdrawTreasury
      security: [{ PrivySessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegentStakingWithdrawRequest'
      responses:
        '200':
          description: Prepared multisig payload for treasury withdrawal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegentStakingPrepareResponse'
        '400':
          $ref: '#/components/responses/StatusMessage400'
        '503':
          $ref: '#/components/responses/StatusMessage503'
  /api/agent-platform/formation:
    get:
      operationId: agentPlatformFormation
      security: [{ PrivySessionCookie: [] }]
      responses:
        '200':
          description: Agent Formation state for the current signed-in human
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentFormationResponse'
        '502':
          $ref: '#/components/responses/StatusMessage502'
        '503':
          $ref: '#/components/responses/StatusMessage503'
  /api/agent-platform/billing/setup/checkout:
    post:
      operationId: agentPlatformBillingSetupCheckout
      security: [{ PrivySessionCookie: [] }]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BillingSetupCheckoutRequest'
      responses:
        '200':
          description: Stripe-hosted billing setup started for the current human
          content:
            application/json:
              schema:
