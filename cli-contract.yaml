openapi: 3.1.0
info:
  title: Regents CLI Contract
  version: 0.1.0
  description: "Canonical Regents CLI surface for two jobs: local shader work and guided platform account, billing, company, and runtime control from the terminal."
commands:
  - name: regents shader list
    summary: List the available shader avatars and their editable parameters.
    auth:
      mode: none
    transport:
      kind: local-runtime
    args: []
    flags:
      - name: --usage
        type: string
        required: false
        enum: [avatar, background, creator-inert]
        description: Filter shaders by usage tag.
    output:
      format: json
      schema:
        type: object
        required: [ok, command, shaders]
        properties:
          ok:
            type: boolean
          command:
            type: string
          shaders:
            type: array
            items:
              type: object
              required: [id, title, description, usage, defineControls]
              properties:
                id:
                  type: string
                title:
                  type: string
                description:
                  type: string
                usage:
                  type: array
                  items:
                    type: string
                defineControls:
                  type: array
                  items:
                    type: object
                    required: [key, kind, defaultValue]
                    properties:
                      key:
                        type: string
                      kind:
                        type: string
                      defaultValue:
                        type: string
                      min:
                        type: number
                      max:
                        type: number
                      step:
                        type: number
                      description:
                        type: [string, 'null']
  - name: regents shader export
    summary: Render one shader avatar to a local image file, using defaults or explicit define overrides.
    auth:
      mode: none
    transport:
      kind: local-runtime
    args:
      - name: shader_id
        type: string
        required: true
        description: Shader id from `regents shader list`.
    flags:
      - name: --define
        type: string
        required: false
        repeatable: true
        description: Repeatable KEY=VALUE override for shader define controls.
      - name: --width
        type: integer
        required: false
        default: 1024
        description: Output width in pixels.
      - name: --height
        type: integer
        required: false
        default: 1024
        description: Output height in pixels.
      - name: --settle-ms
        type: integer
        required: false
        default: 900
        description: Milliseconds to let the shader run before capture.
      - name: --out
        type: string
        required: false
        description: Output image path. Defaults to ./regent-shader-<shader_id>.png
      - name: --spec-out
        type: string
        required: false
        description: Optional output path for the captured shader metadata JSON.
      - name: --browser
        type: string
        required: false
        description: Optional Chrome or Chromium executable path for the headless renderer.
    output:
      format: json
      schema:
        type: object
        required: [ok, command, shader, outputPath, width, height, defineValues, imageSpec]
        properties:
          ok:
            type: boolean
          command:
            type: string
          shader:
            type: object
            required: [id, title, usage, sourceUrl]
            properties:
              id:
                type: string
              title:
                type: string
              usage:
                type: array
                items:
                  type: string
              sourceUrl:
                type: string
          outputPath:
            type: string
          specPath:
            type: [string, 'null']
          width:
            type: integer
          height:
            type: integer
          defineValues:
            type: object
            additionalProperties:
              type: string
          imageSpec:
            type: object
            required: [engine, shaderId, shaderTitle, sourceUrl, usage, capturedAt, previewSrc, defineValues]
            properties:
              engine:
                type: string
              shaderId:
                type: string
              shaderTitle:
                type: string
              sourceUrl:
                type: string
              usage:
                type: array
                items:
                  type: string
              capturedAt:
                type: string
              previewSrc:
                type: string
              defineValues:
                type: object
                additionalProperties:
                  type: string
  - name: regents platform auth login
    summary: Sign in to the Regent website from the terminal and save the session for later platform commands.
    availability: current
    auth:
      mode: privy-identity-token
    transport:
      kind: http-cookie-session
      operationIds: [privySessionCsrf, privySessionCreate]
    args: []
    flags:
      - name: --identity-token
        type: string
        required: false
        description: Privy identity token for the platform account.
      - name: --identity-token-env
        type: string
        required: false
        description: Environment variable name that contains the Privy identity token.
      - name: --display-name
        type: string
        required: false
        description: Optional display name to save for the signed-in person.
      - name: --origin
        type: string
        required: false
        default: https://regents.sh
        description: Platform origin to call.
      - name: --session-file
        type: string
        required: false
        description: Local path for the saved platform session file.
    output:
      format: json
      schema:
        type: object
        required: [ok, command, origin, sessionFile, profile]
        properties:
          ok: {type: boolean}
          command: {type: string}
          origin: {type: string}
          sessionFile: {type: string}
          profile:
            $ref: '#/components/schemas/CurrentHumanProfile'
  - name: regents platform auth status
    summary: Show who is signed in through the saved platform session.
    availability: current
    auth:
      mode: session-file
    transport:
      kind: http-cookie-session
      operationIds: [privySessionProfile]
    args: []
    flags:
      - name: --origin
        type: string
        required: false
        default: https://regents.sh
        description: Platform origin to call. Defaults to the saved session origin when present.
      - name: --session-file
        type: string
        required: false
        description: Local path for the saved platform session file.
    output:
      format: json
      schema:
        type: object
        required: [ok, command, origin, sessionFile, profile]
        properties:
          ok: {type: boolean}
          command: {type: string}
          origin: {type: string}
          sessionFile: {type: string}
          profile:
            $ref: '#/components/schemas/CurrentHumanProfile'
  - name: regents platform auth logout
    summary: Delete the saved platform session and sign out from platform commands.
    availability: current
    auth:
      mode: session-file
    transport:
      kind: http-cookie-session
      operationIds: [privySessionDelete]
    args: []
    flags:
      - name: --origin
        type: string
        required: false
        default: https://regents.sh
        description: Platform origin to call. Defaults to the saved session origin when present.
      - name: --session-file
        type: string
        required: false
        description: Local path for the saved platform session file.
    output:
      format: json
      schema:
        type: object
        required: [ok, command, origin, sessionFile]
        properties:
          ok: {type: boolean}
          command: {type: string}
          origin: {type: string}
          sessionFile: {type: string}
  - name: regents agentbook register
    summary: Start a hosted human-backed trust flow for the saved Regent agent identity.
    availability: current
    auth:
      mode: agent-siwa
    transport:
      kind: http
      operationIds: [createAgentbookTrustSession]
    args: []
    flags:
      - name: --watch
        type: boolean
        required: false
        default: false
        description: Keep polling until the hosted trust session finishes or fails.
    output:
      format: json
      schema:
        type: object
        required: [ok, session]
        properties:
          ok: {type: boolean}
          session: {type: object, additionalProperties: true}
  - name: regents agentbook sessions watch
    summary: Poll one hosted human-backed trust session for the saved Regent agent identity.
    availability: current
    auth:
      mode: agent-siwa
    transport:
      kind: http
      operationIds: [getAgentbookTrustSession]
    args:
      - name: session_id
        type: string
        required: true
        description: Session id returned by `regents agentbook register`.
    flags:
      - name: --interval
        type: number
        required: false
        default: 2
        description: Seconds between status polls.
    output:
      format: json
      schema:
        type: object
        required: [ok, session]
        properties:
          ok: {type: boolean}
          session: {type: object, additionalProperties: true}
  - name: regents agentbook lookup
    summary: Show the saved human-backed trust summary for the current Regent agent identity.
    availability: current
    auth:
      mode: agent-siwa
    transport:
      kind: http
      operationIds: [lookupAgentbookTrust]
    args: []
    flags: []
    output:
      format: json
      schema:
        type: object
        required: [ok, result]
        properties:
          ok: {type: boolean}
          result: {type: object, additionalProperties: true}
  - name: regents platform formation status
    summary: Show launch readiness from the saved session, including claimed names, billing, and owned companies.
    availability: current
    auth:
      mode: session-file
    transport:
      kind: http-cookie-session
      operationIds: [agentPlatformFormation]
    args: []
    flags:
      - name: --origin
        type: string
        required: false
        default: https://regents.sh
        description: Platform origin to call. Defaults to the saved session origin when present.
      - name: --session-file
        type: string
        required: false
        description: Local path for the saved platform session file.
    output:
      format: json
      schema:
        type: object
        required: [ok, command, origin, formation]
        properties:
          ok: {type: boolean}
          command: {type: string}
          origin: {type: string}
          formation:
            $ref: '#/components/schemas/AgentFormationResponse'
  - name: regents platform billing account
    summary: Show the billing account tied to the saved platform session.
    availability: current
    auth:
      mode: session-file
    transport:
      kind: http-cookie-session
      operationIds: [agentPlatformBillingAccount]
    args: []
    flags:
      - name: --origin
        type: string
        required: false
        default: https://regents.sh
        description: Platform origin to call. Defaults to the saved session origin when present.
      - name: --session-file
        type: string
        required: false
        description: Local path for the saved platform session file.
    output:
      format: json
      schema:
        type: object
        required: [ok, command, origin, billing]
        properties:
          ok: {type: boolean}
          command: {type: string}
          origin: {type: string}
          billing:
            type: object
            required: [ok, billing_account]
            properties:
              ok: {type: boolean}
              billing_account:
                $ref: '#/components/schemas/BillingAccount'
  - name: regents platform billing usage
    summary: Show shared runtime credit and company usage from the saved platform session.
    availability: current
    auth:
      mode: session-file
    transport:
      kind: http-cookie-session
      operationIds: [agentPlatformBillingUsage]
    args: []
    flags:
      - name: --origin
        type: string
        required: false
        default: https://regents.sh
        description: Platform origin to call. Defaults to the saved session origin when present.
      - name: --session-file
        type: string
        required: false
        description: Local path for the saved platform session file.
    output:
      format: json
      schema:
        type: object
        required: [ok, command, origin, usage]
        properties:
          ok: {type: boolean}
          command: {type: string}
          origin: {type: string}
          usage:
            type: object
            required: [ok, usage]
            properties:
              ok: {type: boolean}
              usage:
                $ref: '#/components/schemas/BillingUsageSummary'
  - name: regents platform billing setup
    summary: Open billing setup for the saved platform account.
    availability: beta_disabled
    auth:
      mode: session-file
    transport:
      kind: beta-disabled
    args: []
    flags:
      - name: --claimed-label
        type: string
        required: false
        description: Optional claimed name to carry into the hosted billing return link.
      - name: --origin
        type: string
        required: false
        default: https://regents.sh
        description: Platform origin to call. Defaults to the saved session origin when present.
      - name: --session-file
        type: string
        required: false
        description: Local path for the saved platform session file.
    output:
      format: json
      schema:
        $ref: '#/components/schemas/BetaUnavailableCommandResponse'
  - name: regents platform billing topup
    summary: Open runtime credit checkout for the saved platform account.
    availability: beta_disabled
    auth:
      mode: session-file
    transport:
      kind: beta-disabled
    args: []
    flags:
      - name: --amount-usd-cents
        type: integer
        required: true
        description: Runtime credit amount in US cents.
      - name: --origin
        type: string
        required: false
        default: https://regents.sh
        description: Platform origin to call. Defaults to the saved session origin when present.
      - name: --session-file
        type: string
        required: false
        description: Local path for the saved platform session file.
    output:
      format: json
      schema:
        $ref: '#/components/schemas/BetaUnavailableCommandResponse'
  - name: regents platform company create
    summary: Launch a company for one claimed name from the saved platform account.
    availability: beta_disabled
    auth:
      mode: session-file
    transport:
      kind: beta-disabled
    args: []
    flags:
      - name: --claimed-label
        type: string
        required: true
        description: Claimed name label to launch as a company.
      - name: --origin
        type: string
        required: false
        default: https://regents.sh
        description: Platform origin to call. Defaults to the saved session origin when present.
      - name: --session-file
        type: string
        required: false
        description: Local path for the saved platform session file.
    output:
      format: json
      schema:
        $ref: '#/components/schemas/BetaUnavailableCommandResponse'
  - name: regents platform company runtime
    summary: Show runtime state for one owned company from the saved platform session.
    availability: current
    auth:
      mode: session-file
    transport:
      kind: http-cookie-session
      operationIds: [agentPlatformFormationRuntime]
    args: []
    flags:
      - name: --slug
        type: string
        required: true
        description: Company slug to inspect.
      - name: --origin
        type: string
        required: false
        default: https://regents.sh
        description: Platform origin to call. Defaults to the saved session origin when present.
      - name: --session-file
        type: string
        required: false
        description: Local path for the saved platform session file.
    output:
      format: json
      schema:
        type: object
        required: [ok, command, origin, runtime]
        properties:
          ok: {type: boolean}
          command: {type: string}
          origin: {type: string}
          runtime:
            $ref: '#/components/schemas/AgentRuntimeResponse'
  - name: regents runtime create
    summary: Create a runtime for one Regent company.
    availability: current
    auth:
      mode: session-file
    transport:
      kind: http-cookie-session
      operationIds: [createRwrRuntime]
    args: []
    flags:
      - name: --company-id
        type: string
        required: true
        description: Regent company id.
      - name: --name
        type: string
        required: true
        description: Runtime name.
      - name: --runner
        type: string
        required: true
        enum: [hermes_local_manager, hermes_hosted_manager, openclaw_local_manager, codex_exec, codex_app_server, openclaw_local_executor, openclaw_code_agent_local, fake, custom_worker]
        description: Worker path to use.
      - name: --execution-surface
        type: string
        required: true
        enum: [hosted_sprite, local_bridge, external_webhook]
        description: Where the runtime runs.
      - name: --billing-mode
        type: string
        required: true
        enum: [platform_hosted, user_local, external_self_reported]
        description: How runtime costs are handled.
      - name: --origin
        type: string
        required: false
        default: https://regents.sh
        description: Platform origin to call. Defaults to the saved session origin when present.
      - name: --session-file
        type: string
        required: false
        description: Local path for the saved platform session file.
    output:
      format: json
      schema:
        $ref: '#/components/schemas/RwrRuntimeCommandResponse'
  - name: regents runtime show
    summary: Show one runtime for a Regent company.
    availability: current
    auth:
      mode: session-file
    transport:
      kind: http-cookie-session
      operationIds: [getRwrRuntime]
    args:
      - name: runtime_id
        type: string
        required: true
        description: Runtime id.
    flags:
      - name: --company-id
        type: string
        required: true
        description: Regent company id.
      - name: --origin
        type: string
        required: false
        default: https://regents.sh
        description: Platform origin to call. Defaults to the saved session origin when present.
      - name: --session-file
        type: string
        required: false
        description: Local path for the saved platform session file.
    output:
      format: json
      schema:
        $ref: '#/components/schemas/RwrRuntimeCommandResponse'
  - name: regents runtime checkpoint
    summary: Save a checkpoint for one runtime.
    availability: current
    auth:
      mode: session-file
    transport:
      kind: http-cookie-session
      operationIds: [checkpointRwrRuntime]
    args:
      - name: runtime_id
        type: string
        required: true
        description: Runtime id.
    flags:
      - name: --company-id
        type: string
        required: true
        description: Regent company id.
      - name: --checkpoint-ref
        type: string
        required: true
        description: Checkpoint reference.
      - name: --origin
        type: string
        required: false
        default: https://regents.sh
        description: Platform origin to call. Defaults to the saved session origin when present.
      - name: --session-file
        type: string
        required: false
        description: Local path for the saved platform session file.
    output:
      format: json
      schema:
        $ref: '#/components/schemas/RwrRuntimeCheckpointCommandResponse'
  - name: regents runtime restore
    summary: Restore one runtime from a checkpoint.
    availability: current
    auth:
      mode: session-file
    transport:
      kind: http-cookie-session
      operationIds: [restoreRwrRuntime]
    args:
      - name: runtime_id
        type: string
        required: true
        description: Runtime id.
    flags:
      - name: --company-id
        type: string
        required: true
        description: Regent company id.
      - name: --checkpoint-id
        type: string
        required: true
        description: Checkpoint id.
      - name: --origin
        type: string
        required: false
        default: https://regents.sh
        description: Platform origin to call. Defaults to the saved session origin when present.
      - name: --session-file
        type: string
        required: false
        description: Local path for the saved platform session file.
    output:
      format: json
      schema:
        $ref: '#/components/schemas/RwrRuntimeRestoreCommandResponse'
  - name: regents runtime pause
    summary: Pause one runtime for a Regent company.
    availability: current
    auth:
      mode: session-file
    transport:
      kind: http-cookie-session
      operationIds: [pauseRwrRuntime]
    args:
      - name: runtime_id
        type: string
        required: true
        description: Runtime id.
    flags:
      - name: --company-id
        type: string
        required: true
        description: Regent company id.
      - name: --origin
        type: string
        required: false
        default: https://regents.sh
        description: Platform origin to call. Defaults to the saved session origin when present.
      - name: --session-file
        type: string
        required: false
        description: Local path for the saved platform session file.
    output:
      format: json
      schema:
        $ref: '#/components/schemas/RwrRuntimeCommandResponse'
  - name: regents runtime resume
    summary: Resume one runtime for a Regent company.
    availability: current
    auth:
      mode: session-file
    transport:
      kind: http-cookie-session
      operationIds: [resumeRwrRuntime]
    args:
      - name: runtime_id
        type: string
        required: true
        description: Runtime id.
    flags:
      - name: --company-id
        type: string
        required: true
        description: Regent company id.
      - name: --origin
        type: string
        required: false
        default: https://regents.sh
        description: Platform origin to call. Defaults to the saved session origin when present.
      - name: --session-file
        type: string
        required: false
        description: Local path for the saved platform session file.
    output:
      format: json
      schema:
        $ref: '#/components/schemas/RwrRuntimeCommandResponse'
  - name: regents runtime services
    summary: List services for one runtime.
    availability: current
    auth:
      mode: session-file
    transport:
      kind: http-cookie-session
      operationIds: [listRwrRuntimeServices]
    args:
      - name: runtime_id
        type: string
        required: true
        description: Runtime id.
    flags:
      - name: --company-id
        type: string
        required: true
        description: Regent company id.
      - name: --origin
        type: string
        required: false
        default: https://regents.sh
        description: Platform origin to call. Defaults to the saved session origin when present.
      - name: --session-file
        type: string
        required: false
        description: Local path for the saved platform session file.
    output:
      format: json
      schema:
        $ref: '#/components/schemas/RwrRuntimeServiceListCommandResponse'
  - name: regents runtime health
    summary: Show health for one runtime.
    availability: current
    auth:
      mode: session-file
    transport:
      kind: http-cookie-session
      operationIds: [getRwrRuntimeHealth]
    args:
      - name: runtime_id
        type: string
        required: true
        description: Runtime id.
    flags:
      - name: --company-id
        type: string
        required: true
        description: Regent company id.
      - name: --origin
        type: string
        required: false
        default: https://regents.sh
        description: Platform origin to call. Defaults to the saved session origin when present.
      - name: --session-file
        type: string
        required: false
        description: Local path for the saved platform session file.
    output:
      format: json
      schema:
        $ref: '#/components/schemas/RwrRuntimeHealthCommandResponse'
  - name: regents work create
    summary: Create work for one Regent company.
    availability: current
    auth:
      mode: session-file
    transport:
      kind: http-cookie-session
      operationIds: [createRwrWorkItem]
    args: []
    flags:
      - name: --company-id
        type: string
        required: true
        description: Regent company id.
      - name: --title
        type: string
        required: true
        description: Work title.
      - name: --description
        type: string
        required: false
        description: Work details.
      - name: --origin
        type: string
        required: false
        default: https://regents.sh
        description: Platform origin to call. Defaults to the saved session origin when present.
      - name: --session-file
        type: string
        required: false
        description: Local path for the saved platform session file.
    output:
      format: json
      schema:
        $ref: '#/components/schemas/RwrWorkItemCommandResponse'
  - name: regents work list
    summary: List work for one Regent company.
    availability: current
    auth:
      mode: session-file
    transport:
      kind: http-cookie-session
      operationIds: [listRwrWorkItems]
    args: []
    flags:
      - name: --company-id
        type: string
        required: true
        description: Regent company id.
      - name: --origin
        type: string
        required: false
        default: https://regents.sh
        description: Platform origin to call. Defaults to the saved session origin when present.
      - name: --session-file
        type: string
        required: false
        description: Local path for the saved platform session file.
    output:
      format: json
      schema:
        $ref: '#/components/schemas/RwrWorkItemListCommandResponse'
  - name: regents work show
    summary: Show one work item for a Regent company.
    availability: current
    auth:
      mode: session-file
    transport:
      kind: http-cookie-session
      operationIds: [getRwrWorkItem]
    args:
      - name: work_item_id
        type: string
        required: true
        description: Work item id.
    flags:
      - name: --company-id
        type: string
        required: true
        description: Regent company id.
      - name: --origin
        type: string
        required: false
        default: https://regents.sh
        description: Platform origin to call. Defaults to the saved session origin when present.
      - name: --session-file
        type: string
        required: false
        description: Local path for the saved platform session file.
    output:
      format: json
      schema:
        $ref: '#/components/schemas/RwrWorkItemCommandResponse'
  - name: regents work run
    summary: Start a run for one work item.
    availability: current
    auth:
      mode: session-file
    transport:
      kind: http-cookie-session
      operationIds: [startRwrWorkRun]
    args:
      - name: work_item_id
        type: string
        required: true
        description: Work item id.
    flags:
      - name: --company-id
        type: string
        required: true
        description: Regent company id.
      - name: --runner
        type: string
        required: true
        enum: [hermes_local_manager, hermes_hosted_manager, openclaw_local_manager, codex_exec, codex_app_server, openclaw_local_executor, openclaw_code_agent_local, fake, custom_worker]
        description: Worker path to use.
      - name: --worker-id
        type: string
        required: false
        description: Specific worker id.
      - name: --instructions
        type: string
        required: false
        description: Extra instructions for this run.
      - name: --origin
        type: string
        required: false
        default: https://regents.sh
        description: Platform origin to call. Defaults to the saved session origin when present.
      - name: --session-file
        type: string
        required: false
        description: Local path for the saved platform session file.
    output:
      format: json
      schema:
        $ref: '#/components/schemas/RwrRunCommandResponse'
  - name: regents work watch
    summary: Watch events for one work run.
    availability: current
    auth:
      mode: session-file
    transport:
      kind: http-cookie-session
      operationIds: [listRwrRunEvents]
    args:
      - name: run_id
        type: string
        required: true
        description: Run id.
    flags:
      - name: --company-id
        type: string
        required: true
        description: Regent company id.
      - name: --origin
        type: string
        required: false
        default: https://regents.sh
        description: Platform origin to call. Defaults to the saved session origin when present.
      - name: --session-file
        type: string
        required: false
        description: Local path for the saved platform session file.
    output:
      format: json
      schema:
        $ref: '#/components/schemas/RwrRunEventListCommandResponse'
  - name: regents work local-loop
    summary: Let one local worker check for assigned Regent work.
    availability: current
    auth:
      mode: agent-siwa
    transport:
      kind: http
      operationIds:
        - heartbeatRwrWorker
        - listRwrWorkerAssignments
        - claimRwrWorkerAssignment
        - appendRwrRunEvent
        - createRwrRunArtifact
        - requestRwrDelegation
        - releaseRwrWorkerAssignment
        - completeRwrWorkerAssignment
    args: []
    flags:
      - name: --company-id
        type: string
        required: true
        description: Regent company id.
      - name: --worker-id
        type: string
        required: true
        description: Local worker id.
      - name: --once
        type: boolean
        required: false
        default: false
        description: Check once and exit.
      - name: --sleep-ms
        type: integer
        required: false
        default: 5000
        description: Wait time between checks.
      - name: --artifact-title
        type: string
        required: false
        description: Approved artifact title to upload for the claimed run.
      - name: --artifact-body
        type: string
        required: false
        description: Approved artifact text to upload for the claimed run.
      - name: --delegate-runner
        type: string
        required: false
        enum: [hermes_local_manager, hermes_hosted_manager, openclaw_local_manager, codex_exec, codex_app_server, openclaw_local_executor, openclaw_code_agent_local, fake, custom_worker]
        description: Worker path to request for delegated work.
      - name: --delegate-title
        type: string
        required: false
        description: Delegated work title.
    output:
      format: json
      schema:
        $ref: '#/components/schemas/RwrLocalWorkerLoopCommandResponse'
  - name: regents agent connect hermes
    summary: Connect a Hermes worker to one Regent company.
    availability: current
    auth:
      mode: agent-siwa
    transport:
      kind: http
      operationIds: [registerRwrWorker]
    args: []
    flags:
      - name: --company-id
        type: string
        required: true
        description: Regent company id.
      - name: --name
        type: string
        required: false
        description: Display name.
      - name: --role
        type: string
        required: true
        enum: [manager, executor, hybrid]
        description: Worker role.
      - name: --write-connector
        type: boolean
        required: false
        default: true
        description: Write the local Hermes connector files.
    output:
      format: json
      schema:
        $ref: '#/components/schemas/RwrHermesConnectCommandResponse'
  - name: regents agent connect openclaw
    summary: Connect a local OpenClaw worker to one Regent company.
    availability: current
    auth:
      mode: agent-siwa
    transport:
      kind: http
      operationIds: [registerRwrWorker]
    args: []
    flags:
      - name: --company-id
        type: string
        required: true
        description: Regent company id.
      - name: --name
        type: string
        required: false
        description: Display name.
      - name: --role
        type: string
        required: true
        enum: [manager, executor, hybrid]
        description: Worker role.
      - name: --write-skill
        type: boolean
        required: false
        default: true
        description: Write the local OpenClaw Regents skill file.
    output:
      format: json
      schema:
        $ref: '#/components/schemas/RwrOpenClawConnectCommandResponse'
  - name: regents agent link
    summary: Link one manager to one worker for a Regent company.
    availability: current
    auth:
      mode: session-file
    transport:
      kind: http-cookie-session
      operationIds: [createRwrAgentRelationship]
    args: []
    flags:
      - name: --company-id
        type: string
        required: true
        description: Regent company id.
      - name: --manager-agent-id
        type: string
        required: false
        description: Manager agent id.
      - name: --manager-worker-id
        type: string
        required: false
        description: Manager worker id.
      - name: --executor-agent-id
        type: string
        required: false
        description: Executor agent id.
      - name: --executor-worker-id
        type: string
        required: false
        description: Executor worker id.
      - name: --relationship
        type: string
        required: true
        enum: [manager_of, preferred_executor, can_delegate_to, reports_to]
        description: Relationship to create.
      - name: --origin
        type: string
        required: false
        default: https://regents.sh
        description: Platform origin to call. Defaults to the saved session origin when present.
      - name: --session-file
        type: string
        required: false
        description: Local path for the saved platform session file.
    output:
      format: json
      schema:
        $ref: '#/components/schemas/RwrAgentRelationshipCommandResponse'
  - name: regents agent execution-pool
    summary: List the workers available to one manager.
    availability: current
    auth:
      mode: session-file
    transport:
      kind: http-cookie-session
      operationIds: [listRwrExecutionPool]
    args: []
    flags:
      - name: --company-id
        type: string
        required: true
        description: Regent company id.
      - name: --manager
        type: string
        required: true
        description: Manager agent or worker id.
      - name: --origin
        type: string
        required: false
        default: https://regents.sh
        description: Platform origin to call. Defaults to the saved session origin when present.
      - name: --session-file
        type: string
        required: false
        description: Local path for the saved platform session file.
    output:
      format: json
      schema:
        $ref: '#/components/schemas/RwrExecutionPoolCommandResponse'
  - name: regents platform sprite pause
    summary: Pause one owned company runtime from the saved platform session.
    availability: beta_disabled
    auth:
      mode: session-file
    transport:
      kind: beta-disabled
    args: []
    flags:
      - name: --slug
        type: string
        required: true
        description: Company slug to pause.
      - name: --origin
        type: string
        required: false
        default: https://regents.sh
        description: Platform origin to call. Defaults to the saved session origin when present.
      - name: --session-file
        type: string
        required: false
        description: Local path for the saved platform session file.
    output:
      format: json
      schema:
        $ref: '#/components/schemas/BetaUnavailableCommandResponse'
  - name: regents platform sprite resume
    summary: Resume one owned company runtime from the saved platform session.
    availability: beta_disabled
    auth:
      mode: session-file
    transport:
      kind: beta-disabled
    args: []
    flags:
      - name: --slug
        type: string
        required: true
        description: Company slug to resume.
      - name: --origin
        type: string
        required: false
        default: https://regents.sh
        description: Platform origin to call. Defaults to the saved session origin when present.
      - name: --session-file
        type: string
        required: false
        description: Local path for the saved platform session file.
    output:
      format: json
      schema:
        $ref: '#/components/schemas/BetaUnavailableCommandResponse'

components:
  schemas:
    BetaUnavailableCommandResponse:
      type: object
      required: [ok, command, status, statusMessage]
      properties:
        ok:
          type: boolean
          const: false
        command: {type: string}
        status:
          type: string
          const: unavailable
        statusMessage: {type: string}
    AgentKind:
      type: string
      enum: [hermes, openclaw, codex, custom, human_operator, regent_bridge]
    WorkerRole:
      type: string
      enum: [manager, executor, hybrid]
    ExecutionSurface:
      type: string
      enum: [hosted_sprite, local_bridge, external_webhook]
    RunnerKind:
      type: string
      enum: [hermes_local_manager, hermes_hosted_manager, openclaw_local_manager, codex_exec, codex_app_server, openclaw_local_executor, openclaw_code_agent_local, fake, custom_worker]
    BillingMode:
      type: string
      enum: [platform_hosted, user_local, external_self_reported]
    TrustScope:
      type: string
      enum: [platform_hosted, local_user_controlled, external_user_controlled]
    ReportedUsagePolicy:
      type: string
      enum: [platform_metered, self_reported, external_reported]
    RelationshipKind:
      type: string
      enum: [manager_of, preferred_executor, can_delegate_to, reports_to]
    RelationshipStatus:
      type: string
      enum: [active, paused, revoked]
    RwrAgentProfile:
      type: object
      required: [id, company_id, name, agent_kind, default_runner_kind, status, visibility]
      properties:
        id: {type: integer}
        company_id: {type: integer}
        name: {type: string}
        agent_kind:
          $ref: '#/components/schemas/AgentKind'
        default_runner_kind:
          oneOf:
            - $ref: '#/components/schemas/RunnerKind'
            - type: 'null'
        status: {type: string}
        visibility:
          type: string
          enum: [operator, company, public]
    RwrWorkItem:
      type: object
      required: [id, company_id, title, description, status, priority, visibility, desired_runner_kind, assigned_worker_id, assigned_agent_profile_id, created_at, updated_at]
      properties:
        id: {type: integer}
        company_id: {type: integer}
        title: {type: string}
        description: {type: [string, 'null']}
        status: {type: string}
        priority:
          type: string
          enum: [normal, urgent]
        visibility:
          type: string
          enum: [operator, company, public]
        desired_runner_kind:
          oneOf:
            - $ref: '#/components/schemas/RunnerKind'
            - type: 'null'
        assigned_worker_id: {type: [integer, 'null']}
        assigned_agent_profile_id: {type: [integer, 'null']}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
    RwrRun:
      type: object
      required: [id, company_id, work_item_id, parent_run_id, root_run_id, worker_id, runtime_profile_id, runner_kind, status, visibility, summary, failure_reason, cost_usd, created_at, updated_at]
      properties:
        id: {type: integer}
        company_id: {type: integer}
        work_item_id: {type: integer}
        parent_run_id: {type: [integer, 'null']}
        root_run_id: {type: [integer, 'null']}
        worker_id: {type: [integer, 'null']}
        runtime_profile_id: {type: [integer, 'null']}
        runner_kind:
          $ref: '#/components/schemas/RunnerKind'
        status: {type: string}
        visibility:
          type: string
          enum: [operator, company, public]
        summary: {type: [string, 'null']}
        failure_reason: {type: [string, 'null']}
        cost_usd: {type: string}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
    RwrRunEvent:
      type: object
      required: [id, company_id, run_id, sequence, kind, actor_kind, actor_id, visibility, sensitivity, payload, occurred_at]
      properties:
        id: {type: integer}
        company_id: {type: integer}
        run_id: {type: integer}
        sequence: {type: integer}
        kind: {type: string}
        actor_kind: {type: [string, 'null']}
        actor_id: {type: [string, 'null']}
        visibility:
          type: string
          enum: [operator, company, public]
        sensitivity:
          type: string
          enum: [normal, sensitive, secret]
        payload:
          type: object
          additionalProperties: true
        occurred_at: {type: string, format: date-time}
    RwrWorker:
      type: object
      required: [id, company_id, agent_profile_id, runtime_profile_id, name, agent_kind, worker_role, execution_surface, runner_kind, billing_mode, trust_scope, reported_usage_policy, status, last_heartbeat_at]
      properties:
        id: {type: integer}
        company_id: {type: integer}
        agent_profile_id: {type: integer}
        runtime_profile_id: {type: [integer, 'null']}
        name: {type: string}
        agent_kind:
          $ref: '#/components/schemas/AgentKind'
        worker_role:
          $ref: '#/components/schemas/WorkerRole'
        execution_surface:
          $ref: '#/components/schemas/ExecutionSurface'
        runner_kind:
          $ref: '#/components/schemas/RunnerKind'
        billing_mode:
          $ref: '#/components/schemas/BillingMode'
        trust_scope:
          $ref: '#/components/schemas/TrustScope'
        reported_usage_policy:
          $ref: '#/components/schemas/ReportedUsagePolicy'
        status: {type: string}
        last_heartbeat_at: {type: [string, 'null'], format: date-time}
    RwrRuntime:
      type: object
      required: [id, company_id, platform_agent_id, name, runner_kind, execution_surface, billing_mode, status, visibility, config, metadata]
      properties:
        id: {type: integer}
        company_id: {type: integer}
        platform_agent_id: {type: [integer, 'null']}
        name: {type: string}
        runner_kind:
          $ref: '#/components/schemas/RunnerKind'
        execution_surface:
          $ref: '#/components/schemas/ExecutionSurface'
        billing_mode:
          $ref: '#/components/schemas/BillingMode'
        status: {type: string}
        visibility:
          type: string
          enum: [operator, company, public]
        config:
          type: object
          additionalProperties: true
        metadata:
          type: object
          additionalProperties: true
    RwrRuntimeCheckpoint:
      type: object
      required: [id, company_id, runtime_profile_id, work_run_id, checkpoint_ref, status, protected, captured_at, metadata, created_at, updated_at]
      properties:
        id: {type: integer}
        company_id: {type: integer}
        runtime_profile_id: {type: integer}
        work_run_id: {type: [integer, 'null']}
        checkpoint_ref: {type: string}
        status:
          type: string
          enum: [pending, ready, failed]
        protected: {type: boolean}
        captured_at: {type: [string, 'null'], format: date-time}
        metadata:
          type: object
          additionalProperties: true
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
    RwrRuntimeService:
      type: object
      required: [id, company_id, runtime_profile_id, name, service_kind, status, endpoint_url, metadata]
      properties:
        id: {type: integer}
        company_id: {type: integer}
        runtime_profile_id: {type: integer}
        name: {type: string}
        service_kind: {type: string}
        status: {type: string}
        endpoint_url: {type: [string, 'null']}
        metadata:
          type: object
          additionalProperties: true
    RwrAgentRelationship:
      type: object
      required: [id, company_id, source_agent_profile_id, target_agent_profile_id, source_worker_id, target_worker_id, relationship_kind, status, max_parallel_runs]
      properties:
        id: {type: integer}
        company_id: {type: integer}
        source_agent_profile_id: {type: [integer, 'null']}
        target_agent_profile_id: {type: [integer, 'null']}
        source_worker_id: {type: [integer, 'null']}
        target_worker_id: {type: [integer, 'null']}
        relationship_kind:
          $ref: '#/components/schemas/RelationshipKind'
        status:
          $ref: '#/components/schemas/RelationshipStatus'
        max_parallel_runs: {type: integer}
    RwrWorkItemListResponse:
      type: object
      required: [ok, company_id, work_items]
      properties:
        ok: {type: boolean, const: true}
        company_id: {type: integer}
        work_items:
          type: array
          items:
            $ref: '#/components/schemas/RwrWorkItem'
    RwrWorkItemResponse:
      type: object
      required: [ok, work_item]
      properties:
        ok: {type: boolean, const: true}
        work_item:
          $ref: '#/components/schemas/RwrWorkItem'
    RwrRunResponse:
      type: object
      required: [ok, run]
      properties:
        ok: {type: boolean, const: true}
        run:
          $ref: '#/components/schemas/RwrRun'
    RwrRunEventListResponse:
      type: object
      required: [ok, run_id, events]
      properties:
        ok: {type: boolean, const: true}
        run_id: {type: integer}
        events:
          type: array
          items:
            $ref: '#/components/schemas/RwrRunEvent'
    RwrWorkerRegistrationResponse:
      type: object
      required: [ok, agent_profile, worker]
      properties:
        ok: {type: boolean, const: true}
        agent_profile:
          $ref: '#/components/schemas/RwrAgentProfile'
        worker:
          $ref: '#/components/schemas/RwrWorker'
    RwrRuntimeResponse:
      type: object
      required: [ok, runtime]
      properties:
        ok: {type: boolean, const: true}
        runtime:
          $ref: '#/components/schemas/RwrRuntime'
    RwrRuntimeCheckpointResponse:
      type: object
      required: [ok, checkpoint]
      properties:
        ok: {type: boolean, const: true}
        checkpoint:
          $ref: '#/components/schemas/RwrRuntimeCheckpoint'
    RwrRuntimeRestoreResponse:
      type: object
      required: [ok, runtime, checkpoint, restore]
      properties:
        ok: {type: boolean, const: true}
        runtime:
          $ref: '#/components/schemas/RwrRuntime'
        checkpoint:
          $ref: '#/components/schemas/RwrRuntimeCheckpoint'
        restore:
          type: object
          required: [status]
          properties:
            status:
              type: string
              enum: [accepted]
    RwrRuntimeServiceListResponse:
      type: object
      required: [ok, company_id, runtime_id, services]
      properties:
        ok: {type: boolean, const: true}
        company_id: {type: integer}
        runtime_id: {type: integer}
        services:
          type: array
          items:
            $ref: '#/components/schemas/RwrRuntimeService'
    RwrRuntimeHealthResponse:
      type: object
      required: [ok, company_id, runtime_id, health]
      properties:
        ok: {type: boolean, const: true}
        company_id: {type: integer}
        runtime_id: {type: integer}
        health:
          type: object
          required: [status, available, metering_status]
          properties:
            status: {type: string}
            available: {type: boolean}
            metering_status: {type: string}
    RwrAgentRelationshipResponse:
      type: object
      required: [ok, relationship]
      properties:
        ok: {type: boolean, const: true}
        relationship:
          $ref: '#/components/schemas/RwrAgentRelationship'
    RwrExecutionPoolResponse:
      type: object
      required: [ok, company_id, workers]
      properties:
        ok: {type: boolean, const: true}
        company_id: {type: integer}
        workers:
          type: array
          items:
            $ref: '#/components/schemas/RwrWorker'
    RwrWorkItemCommandResponse:
      type: object
      required: [ok, command, origin, result]
      properties:
        ok: {type: boolean, const: true}
        command: {type: string}
        origin: {type: string}
        result:
          $ref: '#/components/schemas/RwrWorkItemResponse'
    RwrWorkItemListCommandResponse:
      type: object
      required: [ok, command, origin, result]
      properties:
        ok: {type: boolean, const: true}
        command: {type: string}
        origin: {type: string}
        result:
          $ref: '#/components/schemas/RwrWorkItemListResponse'
    RwrRunCommandResponse:
      type: object
      required: [ok, command, origin, result]
      properties:
        ok: {type: boolean, const: true}
        command: {type: string}
        origin: {type: string}
        result:
          $ref: '#/components/schemas/RwrRunResponse'
    RwrRunEventListCommandResponse:
      type: object
      required: [ok, command, origin, result]
      properties:
        ok: {type: boolean, const: true}
        command: {type: string}
        origin: {type: string}
        result:
          $ref: '#/components/schemas/RwrRunEventListResponse'
    RwrLocalWorkerLoopCommandResponse:
      type: object
      required: [ok, command]
      properties:
        ok: {type: boolean, const: true}
        command: {type: string}
    RwrWorkerRegistrationCommandResponse:
      type: object
      required: [ok, command, origin, result]
      properties:
        ok: {type: boolean, const: true}
        command: {type: string}
        origin: {type: string}
        result:
          $ref: '#/components/schemas/RwrWorkerRegistrationResponse'
    RwrOpenClawConnectCommandResponse:
      type: object
      required: [ok, command, origin, result, openclaw]
      properties:
        ok: {type: boolean, const: true}
        command: {type: string}
        origin: {type: string}
        result:
          $ref: '#/components/schemas/RwrWorkerRegistrationResponse'
        openclaw:
          type: object
          required: [skillFile]
          properties:
            skillFile: {type: [string, 'null']}
    RwrHermesConnectCommandResponse:
      type: object
      required: [ok, command, origin, result, hermes]
      properties:
        ok: {type: boolean, const: true}
        command: {type: string}
        origin: {type: string}
        result:
          $ref: '#/components/schemas/RwrWorkerRegistrationResponse'
        hermes:
          type: object
          required: [configFile, skillFile]
          properties:
            configFile: {type: [string, 'null']}
            skillFile: {type: [string, 'null']}
    RwrAgentRelationshipCommandResponse:
      type: object
      required: [ok, command, origin, result]
      properties:
        ok: {type: boolean, const: true}
        command: {type: string}
        origin: {type: string}
        result:
          $ref: '#/components/schemas/RwrAgentRelationshipResponse'
    RwrExecutionPoolCommandResponse:
      type: object
      required: [ok, command, origin, result]
      properties:
        ok: {type: boolean, const: true}
        command: {type: string}
        origin: {type: string}
        result:
          $ref: '#/components/schemas/RwrExecutionPoolResponse'
    RwrRuntimeCommandResponse:
      type: object
      required: [ok, command, origin, result]
      properties:
        ok: {type: boolean, const: true}
        command: {type: string}
        origin: {type: string}
        result:
          $ref: '#/components/schemas/RwrRuntimeResponse'
    RwrRuntimeCheckpointCommandResponse:
      type: object
      required: [ok, command, origin, result]
      properties:
        ok: {type: boolean, const: true}
        command: {type: string}
        origin: {type: string}
        result:
          $ref: '#/components/schemas/RwrRuntimeCheckpointResponse'
    RwrRuntimeRestoreCommandResponse:
      type: object
      required: [ok, command, origin, result]
      properties:
        ok: {type: boolean, const: true}
        command: {type: string}
        origin: {type: string}
        result:
          $ref: '#/components/schemas/RwrRuntimeRestoreResponse'
    RwrRuntimeServiceListCommandResponse:
      type: object
      required: [ok, command, origin, result]
      properties:
        ok: {type: boolean, const: true}
        command: {type: string}
        origin: {type: string}
        result:
          $ref: '#/components/schemas/RwrRuntimeServiceListResponse'
    RwrRuntimeHealthCommandResponse:
      type: object
      required: [ok, command, origin, result]
      properties:
        ok: {type: boolean, const: true}
        command: {type: string}
        origin: {type: string}
        result:
          $ref: '#/components/schemas/RwrRuntimeHealthResponse'
    PrivySessionCsrf:
      type: object
      required: [ok, csrf_token]
      properties:
        ok: {type: boolean}
        csrf_token: {type: string}
    PrivySessionRequest:
      type: object
      properties:
        display_name: {type: [string, 'null']}
    ClaimedName:
      type: object
      required: [label, fqdn, claimed_at, in_use]
      properties:
        label: {type: string}
        fqdn: {type: string}
        ens_fqdn: {type: [string, 'null']}
        claimed_at: {type: string, format: date-time}
        in_use: {type: boolean}
    WelcomeCredit:
      type: object
      required: [status, amount_usd_cents, credit_scope, granted_at, expires_at, stripe_sync_status]
      properties:
        status: {type: string}
        amount_usd_cents: {type: integer}
        credit_scope: {type: string}
        granted_at: {type: string, format: date-time}
        expires_at: {type: string, format: date-time}
        stripe_sync_status: {type: string}
        stripe_synced_at: {type: [string, 'null'], format: date-time}
    BillingAccount:
      type: object
      required: [status, connected, provider, model_default, margin_bps, runtime_credit_balance_usd_cents, paid_companies, paused_companies, trialing_companies, welcome_credit]
      properties:
        status: {type: string}
        connected: {type: boolean}
        provider: {type: string}
        customer_id: {type: [string, 'null']}
        subscription_id: {type: [string, 'null']}
        model_default: {type: string}
        margin_bps: {type: integer}
        runtime_credit_balance_usd_cents: {type: integer}
        paid_companies: {type: integer}
        paused_companies: {type: integer}
        trialing_companies: {type: integer}
        welcome_credit:
          oneOf:
            - $ref: '#/components/schemas/WelcomeCredit'
            - type: 'null'
    CurrentHuman:
      type: object
      required: [id, privy_user_id, wallet_addresses, billing_account]
      properties:
        id: {type: integer}
        privy_user_id: {type: string}
        wallet_address: {type: [string, 'null']}
        wallet_addresses:
          type: array
          items: {type: string}
        display_name: {type: [string, 'null']}
        billing_account:
          $ref: '#/components/schemas/BillingAccount'
    AgentSubdomain:
      type: object
      required: [hostname, active]
      properties:
        hostname: {type: string}
        active: {type: boolean}
    AgentService:
      type: object
      required: [slug, name, summary, price_label, payment_rail, delivery_mode, public_result_default, sort_order]
      properties:
        slug: {type: string}
        name: {type: string}
        summary: {type: string}
        price_label: {type: string}
        payment_rail: {type: string}
        delivery_mode: {type: string}
        public_result_default: {type: boolean}
        sort_order: {type: integer}
    AgentConnection:
      type: object
      required: [kind, status]
      properties:
        kind: {type: string}
        status: {type: string}
        display_name: {type: [string, 'null']}
        external_ref: {type: [string, 'null']}
        details:
          type: object
          additionalProperties: true
        connected_at: {type: [string, 'null'], format: date-time}
    AgentArtifact:
      type: object
      required: [title, summary, visibility, published_at]
      properties:
        title: {type: string}
        summary: {type: string}
        url: {type: [string, 'null']}
        visibility: {type: string}
        published_at: {type: string, format: date-time}
    AgentFormation:
      type: object
      required: [id, status, current_step, attempt_count]
      properties:
        id: {type: integer}
        claimed_label: {type: [string, 'null']}
        status: {type: string}
        current_step:
          type: string
          enum:
            [
              reserve_claim,
              create_sprite,
              bootstrap_sprite,
              bootstrap_workspace,
              verify_runtime,
              activate_subdomain,
              finalize
            ]
        attempt_count: {type: integer}
        last_error_step: {type: [string, 'null']}
        last_error_message: {type: [string, 'null']}
        started_at: {type: [string, 'null'], format: date-time}
        last_heartbeat_at: {type: [string, 'null'], format: date-time}
        completed_at: {type: [string, 'null'], format: date-time}
    PublicAgentRecord:
      type: object
      required: [id, template_key, name, slug, claimed_label, basename_fqdn, ens_fqdn, status, public_summary, services, connections, feed]
      properties:
        id: {type: integer}
        owner_human_id: {type: [integer, 'null']}
        template_key: {type: string}
        name: {type: string}
        slug: {type: string}
        claimed_label: {type: string}
        basename_fqdn: {type: string}
        ens_fqdn: {type: string}
        status: {type: string}
        public_summary: {type: string}
        hero_statement: {type: [string, 'null']}
        wallet_address: {type: [string, 'null']}
        published_at: {type: [string, 'null'], format: date-time}
        subdomain:
          oneOf:
            - $ref: '#/components/schemas/AgentSubdomain'
            - type: 'null'
        services:
          type: array
          items:
            $ref: '#/components/schemas/AgentService'
        connections:
          type: array
          items:
            $ref: '#/components/schemas/AgentConnection'
        feed:
          type: array
          items:
            $ref: '#/components/schemas/AgentArtifact'
    AgentRecord:
      allOf:
        - $ref: '#/components/schemas/PublicAgentRecord'
        - type: object
          required: [sprite_name, sprite_service_name, workspace_url, workspace_http_port, runtime_status, checkpoint_status, desired_runtime_state, observed_runtime_state, sprite_free_until, sprite_metering_status]
          properties:
            sprite_name: {type: [string, 'null']}
            sprite_service_name: {type: [string, 'null']}
            sprite_checkpoint_ref: {type: [string, 'null']}
            sprite_created_at: {type: [string, 'null'], format: date-time}
            workspace_url: {type: [string, 'null']}
            workspace_http_port: {type: [integer, 'null']}
            hermes_adapter_type: {type: [string, 'null']}
            hermes_model: {type: [string, 'null']}
            hermes_persist_session: {type: boolean}
            hermes_toolsets:
              type: array
              items: {type: string}
            hermes_runtime_plugins:
              type: array
              items: {type: string}
            hermes_shared_skills:
              type: array
              items: {type: string}
            runtime_status: {type: string}
            checkpoint_status: {type: string}
            runtime_last_checked_at: {type: [string, 'null'], format: date-time}
            last_formation_error: {type: [string, 'null']}
            desired_runtime_state: {type: string}
            observed_runtime_state: {type: string}
            sprite_free_until: {type: [string, 'null'], format: date-time}
            sprite_metering_status: {type: string}
            formation:
              oneOf:
                - $ref: '#/components/schemas/AgentFormation'
                - type: 'null'
    CurrentHumanProfile:
      type: object
      required: [ok, authenticated, claimed_names, agents]
      properties:
        ok: {type: boolean}
        authenticated: {type: boolean}
        human:
          oneOf:
            - $ref: '#/components/schemas/CurrentHuman'
            - type: 'null'
        claimed_names:
          type: array
          items:
            $ref: '#/components/schemas/ClaimedName'
        agents:
          type: array
          items:
            $ref: '#/components/schemas/AgentRecord'
    BillingUsageSummary:
      type: object
      required: [runtime_credit_balance_usd_cents, trialing_companies, paid_companies, paused_companies, welcome_credit, companies]
      properties:
        runtime_credit_balance_usd_cents: {type: integer}
        trialing_companies: {type: integer}
        paid_companies: {type: integer}
        paused_companies: {type: integer}
        welcome_credit:
          oneOf:
            - $ref: '#/components/schemas/WelcomeCredit'
            - type: 'null'
        companies:
          type: array
          items:
            type: object
            required: [slug, name, runtime_status, desired_runtime_state, observed_runtime_state, sprite_metering_status, sprite_free_until]
            properties:
              slug: {type: string}
              name: {type: string}
              runtime_status: {type: string}
              desired_runtime_state: {type: string}
              observed_runtime_state: {type: string}
              sprite_metering_status: {type: string}
              sprite_free_until: {type: [string, 'null'], format: date-time}
    AgentFormationResponse:
      type: object
      required: [ok, authenticated, wallet_address, eligible, collections, claimed_names, available_claims, billing_account, owned_companies, active_formations, readiness]
      properties:
        ok: {type: boolean}
        authenticated: {type: boolean}
        wallet_address: {type: [string, 'null']}
        eligible: {type: boolean}
        collections:
          type: object
          required: [animata1, animata2, animataPass]
          properties:
            animata1:
              type: array
              items: {type: integer}
            animata2:
              type: array
              items: {type: integer}
            animataPass:
              type: array
              items: {type: integer}
        claimed_names:
          type: array
          items:
            $ref: '#/components/schemas/ClaimedName'
        available_claims:
          type: array
          items:
            $ref: '#/components/schemas/ClaimedName'
        billing_account:
          $ref: '#/components/schemas/BillingAccount'
        owned_companies:
          type: array
          items:
            $ref: '#/components/schemas/AgentRecord'
        active_formations:
          type: array
          items:
            $ref: '#/components/schemas/AgentFormation'
        readiness:
          $ref: '#/components/schemas/AgentFormationReadiness'
    AgentFormationReadinessStep:
      type: object
      required: [key, label, status, message, action_label, action_path]
      properties:
        key:
          type: string
          enum: [identity, wallet, access, name, billing, template, company, launch_queue]
        label: {type: string}
        status:
          type: string
          enum: [complete, ready, needs_action, waiting]
        message: {type: string}
        action_label: {type: [string, 'null']}
        action_path: {type: [string, 'null']}
    AgentFormationReadiness:
      type: object
      required: [ready, blocked_step, steps]
      properties:
        ready: {type: boolean}
        blocked_step:
          oneOf:
            - $ref: '#/components/schemas/AgentFormationReadinessStep'
            - type: 'null'
        steps:
          type: array
          items:
            $ref: '#/components/schemas/AgentFormationReadinessStep'
    SpriteRuntimeControl:
      type: object
      required: [slug, desired_runtime_state, observed_runtime_state, runtime_status]
      properties:
        slug: {type: string}
        desired_runtime_state: {type: string}
        observed_runtime_state: {type: string}
        runtime_status: {type: string}
    AgentRuntime:
      type: object
      required: [sprite, workspace, hermes, checkpoint]
      properties:
        sprite:
          type: object
          required: [name, status, owner, free_until, metering_status, desired_runtime_state, observed_runtime_state]
          properties:
            name: {type: [string, 'null']}
            status: {type: string}
            owner: {type: string}
            free_until: {type: [string, 'null'], format: date-time}
            metering_status: {type: string}
            desired_runtime_state: {type: string}
            observed_runtime_state: {type: string}
        workspace:
          type: object
          required: [url, status, http_port]
          properties:
            url: {type: [string, 'null']}
            status: {type: string}
            http_port: {type: integer}
        hermes:
          type: object
          required: [status, adapter_type, model, persist_session, toolsets, runtime_plugins, shared_skills]
          properties:
            status: {type: string}
            adapter_type: {type: string}
            model: {type: string}
            persist_session: {type: boolean}
            toolsets:
              type: array
              items: {type: string}
            runtime_plugins:
              type: array
              items: {type: string}
            shared_skills:
              type: array
              items: {type: string}
        checkpoint:
          type: object
          required: [status]
          properties:
            status: {type: string}
    AgentRuntimeResponse:
      type: object
      required: [ok, agent, runtime, billing_account]
      properties:
        ok: {type: boolean}
        agent:
          $ref: '#/components/schemas/AgentRecord'
        runtime:
          $ref: '#/components/schemas/AgentRuntime'
        billing_account:
          $ref: '#/components/schemas/BillingAccount'
        formation:
          oneOf:
            - $ref: '#/components/schemas/AgentFormation'
            - type: 'null'
