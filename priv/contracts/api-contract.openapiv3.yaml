components:
  parameters:
    SessionId:
      name: id
      in: path
      required: true
      schema:
        type: string
    CompanyId:
      name: company_id
      in: path
      required: true
      schema:
        type: string
  responses:
    StatusMessage400:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StatusMessage'
    StatusMessage402:
      description: Payment required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StatusMessage'
    StatusMessage403:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StatusMessage'
    StatusMessage401:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StatusMessage'
    StatusMessage404:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StatusMessage'
    StatusMessage409:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StatusMessage'
    StatusMessage429:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StatusMessage'
    StatusMessage502:
      description: Upstream dependency failure
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StatusMessage'
    StatusMessage503:
      description: Missing server configuration or unavailable dependency
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StatusMessage'
  securitySchemes:
    PrivyBearerToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
    PrivySessionCookie:
      type: apiKey
      in: cookie
      name: _platform_phx_key
    AgentSessionCookie:
      type: apiKey
      in: cookie
      name: _platform_phx_key
    AgentSiwaHeaders:
      type: apiKey
      in: header
      name: x-siwa-receipt
      description: Signed SIWA header bundle used by authenticated agent requests. The required receipt audience depends on the operation description.
  schemas:
    StatusMessage:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, product, status, path, request_id, message]
          properties:
            code:
              type: string
            product:
              type: string
              enum: [platform]
            status:
              type: integer
            path:
              type: string
            request_id:
              type: string
              nullable: true
            message:
              type: string
            next_steps:
              type: string
              nullable: true
          additionalProperties: false
    AgentKind:
      type: string
      enum: [hermes, openclaw, codex, custom, human_operator, regent_bridge]
    WorkerRole:
      type: string
      enum: [manager, executor, hybrid]
    ExecutionSurface:
      type: string
      enum: [hosted_sprite, local_bridge, external_webhook]
    RunnerKind:
      type: string
      enum:
        [
          hermes_local_manager,
          hermes_hosted_manager,
          openclaw_local_manager,
          codex_exec,
          codex_app_server,
          openclaw_local_executor,
          openclaw_code_agent_local,
          fake,
          custom_worker
        ]
    BillingMode:
      type: string
      enum: [platform_hosted, user_local, external_self_reported]
    TrustScope:
      type: string
      enum: [platform_hosted, local_user_controlled, external_user_controlled]
    ReportedUsagePolicy:
      type: string
      enum: [platform_metered, self_reported, external_reported]
    RelationshipKind:
      type: string
      enum: [manager_of, preferred_executor, can_delegate_to, reports_to]
    RelationshipStatus:
      type: string
      enum: [active, paused, revoked]
    RwrCompanySummary:
      type: object
      required: [id, name, slug, status]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        status:
          type: string
    RwrAgentProfile:
      type: object
      required: [id, company_id, name, agent_kind, default_runner_kind, status, visibility]
      properties:
        id:
          type: integer
        company_id:
          type: integer
        name:
          type: string
        agent_kind:
          $ref: '#/components/schemas/AgentKind'
        default_runner_kind:
          oneOf:
            - $ref: '#/components/schemas/RunnerKind'
            - type: 'null'
        status:
          type: string
        visibility:
          type: string
          enum: [operator, company, public]
    RwrWorkItem:
      type: object
      required: [id, company_id, title, description, status, priority, visibility, desired_runner_kind, assigned_worker_id, assigned_agent_profile_id, created_at, updated_at]
      properties:
        id:
          type: integer
        company_id:
          type: integer
        title:
          type: string
        description:
          type: [string, 'null']
        status:
          type: string
        priority:
          type: string
          enum: [normal, urgent]
        visibility:
          type: string
          enum: [operator, company, public]
        desired_runner_kind:
          oneOf:
            - $ref: '#/components/schemas/RunnerKind'
            - type: 'null'
        assigned_worker_id:
          type: [integer, 'null']
        assigned_agent_profile_id:
          type: [integer, 'null']
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    RwrRun:
      type: object
      required: [id, company_id, work_item_id, parent_run_id, root_run_id, worker_id, runtime_profile_id, runner_kind, status, visibility, summary, failure_reason, cost_usd, created_at, updated_at]
      properties:
        id:
          type: integer
        company_id:
          type: integer
        work_item_id:
          type: integer
        parent_run_id:
          type: [integer, 'null']
        root_run_id:
          type: [integer, 'null']
        worker_id:
          type: [integer, 'null']
        runtime_profile_id:
          type: [integer, 'null']
        runner_kind:
          $ref: '#/components/schemas/RunnerKind'
        status:
          type: string
        visibility:
          type: string
          enum: [operator, company, public]
        summary:
          type: [string, 'null']
        failure_reason:
          type: [string, 'null']
        cost_usd:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    RwrRunTree:
      type: object
      required: [run, children]
      properties:
        run:
          $ref: '#/components/schemas/RwrRun'
        children:
          type: array
          items:
            $ref: '#/components/schemas/RwrRunTree'
    RwrRunEvent:
      type: object
      required: [id, company_id, run_id, sequence, kind, actor_kind, actor_id, visibility, sensitivity, payload, occurred_at]
      properties:
        id:
          type: integer
        company_id:
          type: integer
        run_id:
          type: integer
        sequence:
          type: integer
        kind:
          type: string
        actor_kind:
          type: [string, 'null']
        actor_id:
          type: [string, 'null']
        visibility:
          type: string
          enum: [operator, company, public]
        sensitivity:
          type: string
          enum: [normal, sensitive, secret]
        payload:
          type: object
          additionalProperties: true
        occurred_at:
          type: string
          format: date-time
    RwrArtifact:
      type: object
      required: [id, company_id, work_item_id, run_id, artifact_type, title, url, visibility, attestation_level, created_at, updated_at]
      properties:
        id:
          type: integer
        company_id:
          type: integer
        work_item_id:
          type: integer
        run_id:
          type: integer
        artifact_type:
          type: string
        title:
          type: [string, 'null']
        url:
          type: [string, 'null']
        visibility:
          type: string
          enum: [operator, company, public]
        attestation_level:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    RwrApproval:
      type: object
      required: [id, company_id, run_id, approval_type, status, requested_by_actor_kind, requested_by_actor_id, risk_summary, payload, resolved_by_human_id, resolved_at, expires_at, created_at, updated_at]
      properties:
        id:
          type: integer
        company_id:
          type: integer
        run_id:
          type: integer
        approval_type:
          type: string
        status:
          type: string
          enum: [pending, approved, denied, expired, canceled]
        requested_by_actor_kind:
          type: string
        requested_by_actor_id:
          type: [string, 'null']
        risk_summary:
          type: [string, 'null']
        payload:
          type: object
          additionalProperties: true
        resolved_by_human_id:
          type: [integer, 'null']
        resolved_at:
          type: [string, 'null']
          format: date-time
        expires_at:
          type: [string, 'null']
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
